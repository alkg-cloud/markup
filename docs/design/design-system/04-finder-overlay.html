<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>04 — Finder Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>:root{--bg:oklch(11% 0.03 165);--bg-elevated:oklch(7% 0.02 165);--bg-card:oklch(12% 0.02 165);--bg-card-active:oklch(15% 0.025 165);--surface-hover:rgba(255,255,255,0.04);--surface-active:rgba(255,255,255,0.07);--border-subtle:oklch(17% 0.02 165);--border:oklch(21% 0.025 165);--border-strong:oklch(28% 0.025 165);--text-bright:oklch(97% 0.01 165);--text:oklch(82% 0.04 165);--text-dim:oklch(60% 0.02 165);--text-muted:oklch(47% 0.02 165);--accent:oklch(74.4% 0.193 165);--accent-bright:oklch(82% 0.18 165);--accent-soft:oklch(28% 0.08 165);--accent-overlay-soft:oklch(74.4% 0.193 165/0.18);--accent-overlay-mid:oklch(74.4% 0.193 165/0.35);--btn-bg:rgb(39,39,39);--btn-bg-hover:rgb(48,48,48);--danger:oklch(70% 0.2 25);--danger-soft:oklch(28% 0.09 25);--success:oklch(76% 0.16 152);--warning:oklch(80% 0.15 80);--font-body:"Manrope",system-ui,sans-serif;--font-mono:"JetBrains Mono",monospace;--ease-standard:cubic-bezier(0.32,0.72,0,1);--ease-spring:cubic-bezier(0.5,1.4,0.6,1);--ease-exit:cubic-bezier(0.32,0,0.67,0);--motion-fast:160ms;--motion-base:220ms;--topbar-height:52px;--sidebar-width:280px;--radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-card:14px;--radius-pill:9999px;--shadow-sm:0 2px 6px oklch(0%,0,0/0.45);--shadow-md:0 6px 16px oklch(0%,0,0/0.5);--shadow-glow:0 0 0 1px oklch(74.4% 0.193 165/0.4),0 0 24px oklch(74.4% 0.193 165/0.18);--shadow-popover:0 14px 32px oklch(0%,0,0/0.6),0 6px 12px oklch(0%,0,0/0.45),inset 0 1px 0 oklch(100%,0,0/0.06);--scrim-strong:oklch(0% 0 0/0.65);--focus-ring:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
@media(prefers-reduced-motion:reduce){:root{--motion-fast:0ms;--motion-base:0ms}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}input,textarea{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:var(--radius-xs)}
mark{background:var(--accent-overlay-mid);color:var(--accent-bright);border-radius:2px;padding:0 1px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--radius-pill)}
.demo-label{position:fixed;bottom:16px;right:16px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;z-index:999}

.demo{display:flex;align-items:center;justify-content:center;height:100vh}
.open-btn{height:36px;padding:0 16px;background:var(--accent);color:var(--bg);border-radius:var(--radius-sm);font-weight:600;font-size:13px}.open-btn:hover{background:var(--accent-bright)}
#scrim{position:fixed;inset:0;background:var(--scrim-strong);z-index:900;opacity:0;pointer-events:none;transition:opacity var(--motion-fast) var(--ease-exit)}#scrim.open{opacity:1;pointer-events:auto}
#pal{position:fixed;top:80px;left:50%;transform:translateX(-50%) scale(0.97);width:min(640px,92vw);background:var(--bg-elevated);backdrop-filter:blur(20px);border:1px solid var(--border-strong);border-radius:var(--radius-md);box-shadow:var(--shadow-glow),var(--shadow-popover);z-index:1000;overflow:hidden;opacity:0;pointer-events:none;transition:opacity 120ms var(--ease-exit),transform 120ms var(--ease-exit)}
#pal.open{opacity:1;transform:translateX(-50%) scale(1);pointer-events:auto;transition:opacity 180ms var(--ease-spring),transform 180ms var(--ease-spring)}
.p-row{display:flex;align-items:center;gap:12px;padding:0 16px;height:56px}.p-icon{color:var(--text-muted);flex-shrink:0}
#pinp{flex:1;background:none;border:none;outline:none;font-weight:700;font-size:18px;color:var(--text-bright);letter-spacing:-0.015em;caret-color:var(--accent)}#pinp::placeholder{color:var(--text-muted);font-weight:500}
.p-esc{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xs);padding:3px 7px;cursor:pointer}
.p-div{height:1px;background:var(--border-subtle)}.p-res{max-height:360px;overflow-y:auto;padding:6px 0}
.p-sec{font-weight:600;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);padding:10px 16px 4px}
.p-item{display:flex;align-items:center;gap:10px;padding:0 14px;height:44px;cursor:pointer;border-left:2px solid transparent;transition:background var(--motion-fast);animation:pi 200ms var(--ease-spring) backwards}
@keyframes pi{from{opacity:0;transform:translateX(-6px)}}
.p-item:hover{background:var(--surface-hover)}.p-item.sel{background:var(--accent-overlay-soft);border-left-color:var(--accent)}
.p-ico{width:28px;height:28px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.p-info{flex:1;min-width:0}.p-name{font-size:14px;font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-path{font-size:12px;font-family:var(--font-mono);color:var(--text-muted)}
.p-foot{padding:10px 16px;border-top:1px solid var(--border-subtle);display:flex;gap:16px}
.p-hint{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.p-hint kbd{background:var(--bg-card);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px;font-family:var(--font-mono);color:var(--text-dim)}
</style></head><body>

<div class="demo"><button class="open-btn" onclick="openP()">Open Command Palette (Ctrl+K)</button></div>
<div id="scrim" onclick="closeP()"></div>
<div id="pal">
  <div class="p-row"><svg class="p-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.03 21.97L15.162 14.102C16.31 12.717 17 10.939 17 9C17 4.582 13.418 1 9 1C4.582 1 1 4.582 1 9C1 13.418 4.582 17 9 17C10.939 17 12.717 16.31 14.102 15.162L21.97 23.03L23.031 21.969L23.03 21.97ZM2.5 9C2.5 5.416 5.416 2.5 9 2.5C12.584 2.5 15.5 5.416 15.5 9C15.5 12.584 12.584 15.5 9 15.5C5.416 15.5 2.5 12.584 2.5 9Z"/></svg>
  <input id="pinp" type="text" placeholder="Search mockups, projects, folders..." autocomplete="off"/><button class="p-esc" onclick="closeP()">esc</button></div>
  <div class="p-div"></div>
  <div class="p-res">
    <div class="p-sec">PROJECTS</div>
    <div class="p-item sel" style="animation-delay:0ms"><div class="p-ico">🎨</div><div class="p-info"><div class="p-name">Project Alpha</div></div></div>
    <div class="p-item" style="animation-delay:20ms"><div class="p-ico">📐</div><div class="p-info"><div class="p-name">Project Beta</div></div></div>
    <div class="p-sec">MOCKUPS</div>
    <div class="p-item" style="animation-delay:40ms"><div class="p-ico">🖼</div><div class="p-info"><div class="p-name"><mark>Hero</mark> v3</div><div class="p-path">Alpha / Landing / Hero</div></div></div>
    <div class="p-item" style="animation-delay:60ms"><div class="p-ico">🖼</div><div class="p-info"><div class="p-name">Banner</div><div class="p-path">Alpha / Landing</div></div></div>
    <div class="p-item" style="animation-delay:80ms"><div class="p-ico">🖼</div><div class="p-info"><div class="p-name">Dashboard v2</div><div class="p-path">Beta / Mobile</div></div></div>
  </div>
  <div class="p-foot"><span class="p-hint"><kbd>↑↓</kbd> navigate</span><span class="p-hint"><kbd>↵</kbd> open</span><span class="p-hint"><kbd>esc</kbd> close</span></div>
</div>
<div class="demo-label">04 — Finder Overlay</div>
<script>function openP(){document.getElementById('scrim').classList.add('open');document.getElementById('pal').classList.add('open');document.getElementById('pinp').focus()}function closeP(){document.getElementById('scrim').classList.remove('open');document.getElementById('pal').classList.remove('open')}document.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openP()}if(e.key==='Escape')closeP()})</script>
</body></html>
