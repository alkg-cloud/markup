<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>08 — Dropdown Chevron</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--bg:oklch(11% 0.03 165);--bg-elevated:oklch(7% 0.02 165);--bg-card:oklch(12% 0.02 165);--bg-card-active:oklch(15% 0.025 165);--surface-hover:rgba(255,255,255,0.04);--surface-active:rgba(255,255,255,0.07);--border-subtle:oklch(17% 0.02 165);--border:oklch(21% 0.025 165);--border-strong:oklch(28% 0.025 165);--text-bright:oklch(97% 0.01 165);--text:oklch(82% 0.04 165);--text-dim:oklch(60% 0.02 165);--text-muted:oklch(47% 0.02 165);--accent:oklch(74.4% 0.193 165);--accent-bright:oklch(82% 0.18 165);--accent-soft:oklch(28% 0.08 165);--accent-overlay-soft:oklch(74.4% 0.193 165/0.18);--accent-overlay-mid:oklch(74.4% 0.193 165/0.35);--btn-bg:rgb(39,39,39);--btn-bg-hover:rgb(48,48,48);--danger:oklch(70% 0.2 25);--danger-soft:oklch(28% 0.09 25);--success:oklch(76% 0.16 152);--warning:oklch(80% 0.15 80);--font-body:"Manrope",system-ui,sans-serif;--font-mono:"JetBrains Mono",monospace;--ease-standard:cubic-bezier(0.32,0.72,0,1);--ease-spring:cubic-bezier(0.5,1.4,0.6,1);--ease-exit:cubic-bezier(0.32,0,0.67,0);--motion-fast:160ms;--motion-base:220ms;--topbar-height:52px;--sidebar-width:280px;--sidebar-collapsed-width:52px;--radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-card:14px;--radius-pill:9999px;--shadow-sm:0 2px 6px oklch(0%,0,0/0.45);--shadow-md:0 6px 16px oklch(0%,0,0/0.5);--shadow-glow:0 0 0 1px oklch(74.4% 0.193 165/0.4),0 0 24px oklch(74.4% 0.193 165/0.18);--shadow-popover:0 14px 32px oklch(0%,0,0/0.6),0 6px 12px oklch(0%,0,0/0.45),inset 0 1px 0 oklch(100%,0,0/0.06);--scrim-strong:oklch(0% 0 0/0.65);--focus-ring:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
@media(prefers-reduced-motion:reduce){:root{--motion-fast:0ms;--motion-base:0ms}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}input,textarea{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:var(--radius-xs)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--radius-pill)}
.demo-label{position:fixed;bottom:16px;right:16px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;z-index:999}
.title{font-size:20px;font-weight:700;color:var(--text-bright);margin-bottom:4px}.subtitle{font-size:13px;color:var(--text-dim);margin-bottom:24px}

.tree{width:280px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;padding:4px 0}
.tree-item{display:flex;align-items:center;gap:4px;padding:4px 8px;padding-right:8px;cursor:pointer;position:relative;transition:background var(--motion-fast)}
.tree-item:hover{background:var(--surface-hover)}
.tree-item.active{background:var(--accent-overlay-soft)}
.tree-item.active .tree-label{color:var(--accent-bright)}
.tree-chevron{display:flex;align-items:center;justify-content:center;width:16px;height:16px;flex-shrink:0;color:var(--text-muted);transition:transform var(--motion-base) var(--ease-standard),color var(--motion-fast)}
.tree-chevron.open{transform:rotate(90deg);color:var(--accent)}
.tree-chevron-spacer{width:16px;height:16px;flex-shrink:0}
.tree-label{flex:1;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-kebab{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:var(--radius-xs);color:var(--text-muted);opacity:0;transition:opacity var(--motion-fast),background var(--motion-fast)}
.tree-item:hover .tree-kebab{opacity:1}
.tree-kebab:hover{background:var(--surface-active);color:var(--text)}
.tree-children{}
</style>
</head>
<body>
<div class="demo" style="padding:32px">
  <div class="title">Dropdown Chevron</div>
  <div class="subtitle">Tree items with animated chevron rotation, indent levels, active state, kebab-on-hover.</div>
  <div class="tree" id="tree">
    <div class="tree-item" style="padding-left:12px"><span class="tree-chevron open"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.072 8.024L5.715 3.667l.618-.62L11 7.716v.618L6.333 13l-.618-.619 4.357-4.357z"/></svg></span><span class="tree-label">src</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-children"><div class="tree-item" style="padding-left:28px"><span class="tree-chevron open"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.072 8.024L5.715 3.667l.618-.62L11 7.716v.618L6.333 13l-.618-.619 4.357-4.357z"/></svg></span><span class="tree-label">components</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-children"><div class="tree-item active" style="padding-left:44px"><span class="tree-chevron-spacer"></span><span class="tree-label">Button.tsx</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-item" style="padding-left:44px"><span class="tree-chevron-spacer"></span><span class="tree-label">Card.tsx</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-item" style="padding-left:44px"><span class="tree-chevron-spacer"></span><span class="tree-label">Dialog.tsx</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div></div><div class="tree-item" style="padding-left:28px"><span class="tree-chevron"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.072 8.024L5.715 3.667l.618-.62L11 7.716v.618L6.333 13l-.618-.619 4.357-4.357z"/></svg></span><span class="tree-label">hooks</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-item" style="padding-left:28px"><span class="tree-chevron open"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.072 8.024L5.715 3.667l.618-.62L11 7.716v.618L6.333 13l-.618-.619 4.357-4.357z"/></svg></span><span class="tree-label">utils</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-children"><div class="tree-item" style="padding-left:44px"><span class="tree-chevron-spacer"></span><span class="tree-label">cn.ts</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-item" style="padding-left:44px"><span class="tree-chevron-spacer"></span><span class="tree-label">format.ts</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div></div></div><div class="tree-item" style="padding-left:12px"><span class="tree-chevron"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.072 8.024L5.715 3.667l.618-.62L11 7.716v.618L6.333 13l-.618-.619 4.357-4.357z"/></svg></span><span class="tree-label">public</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-item" style="padding-left:12px"><span class="tree-chevron-spacer"></span><span class="tree-label">package.json</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div><div class="tree-item" style="padding-left:12px"><span class="tree-chevron-spacer"></span><span class="tree-label">tsconfig.json</span><span class="tree-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></span></div>
  </div>
</div>
<div class="demo-label">08 — Dropdown Chevron</div>
<script>
(function(){
  const tree = document.getElementById('tree');
  tree.addEventListener('click', function(e) {
    const item = e.target.closest('.tree-item');
    if (!item) return;

    // kebab click
    if (e.target.closest('.tree-kebab')) return;

    const chevron = item.querySelector('.tree-chevron');
    if (chevron) {
      const isOpen = chevron.classList.contains('open');
      chevron.classList.toggle('open');
      const children = item.nextElementSibling;
      if (children && children.classList.contains('tree-children')) {
        children.style.display = isOpen ? 'none' : '';
      }
    }

    // set active
    tree.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
  });
})();
</script>
</body>
</html>
