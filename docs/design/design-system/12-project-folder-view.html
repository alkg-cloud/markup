<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>12-project-folder-view</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:oklch(11% 0.03 165);--bg-elevated:oklch(7% 0.02 165);--bg-card:oklch(12% 0.02 165);--bg-card-active:oklch(15% 0.025 165);--surface-hover:rgba(255,255,255,0.04);--surface-active:rgba(255,255,255,0.07);--border-subtle:oklch(17% 0.02 165);--border:oklch(21% 0.025 165);--border-strong:oklch(28% 0.025 165);--text-bright:oklch(97% 0.01 165);--text:oklch(82% 0.04 165);--text-dim:oklch(60% 0.02 165);--text-muted:oklch(47% 0.02 165);--accent:oklch(74.4% 0.193 165);--accent-bright:oklch(82% 0.18 165);--accent-soft:oklch(28% 0.08 165);--accent-overlay-soft:oklch(74.4% 0.193 165/0.18);--accent-overlay-mid:oklch(74.4% 0.193 165/0.35);--btn-bg:rgb(39,39,39);--btn-bg-hover:rgb(48,48,48);--danger:oklch(70% 0.2 25);--danger-soft:oklch(28% 0.09 25);--success:oklch(76% 0.16 152);--warning:oklch(80% 0.15 80);--font-body:"Manrope",system-ui,sans-serif;--font-mono:"JetBrains Mono",monospace;--ease-standard:cubic-bezier(0.32,0.72,0,1);--ease-spring:cubic-bezier(0.5,1.4,0.6,1);--ease-exit:cubic-bezier(0.32,0,0.67,0);--motion-fast:160ms;--motion-base:220ms;--topbar-height:52px;--sidebar-width:280px;--sidebar-collapsed-width:52px;--radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-card:14px;--radius-pill:9999px;--shadow-sm:0 2px 6px oklch(0%,0,0/0.45);--shadow-md:0 6px 16px oklch(0%,0,0/0.5);--shadow-glow:0 0 0 1px oklch(74.4% 0.193 165/0.4),0 0 24px oklch(74.4% 0.193 165/0.18);--shadow-popover:0 14px 32px oklch(0%,0,0/0.6),0 6px 12px oklch(0%,0,0/0.45),inset 0 1px 0 oklch(100%,0,0/0.06);--scrim-strong:oklch(0% 0 0/0.65);--focus-ring:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
@media(prefers-reduced-motion:reduce){:root{--motion-fast:0ms;--motion-base:0ms}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}input,textarea{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:var(--radius-xs)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--radius-pill)}
.demo-label{position:fixed;bottom:16px;right:16px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;z-index:999}
.title{font-size:20px;font-weight:700;color:var(--text-bright);margin-bottom:4px}.subtitle{font-size:13px;color:var(--text-dim);margin-bottom:24px}

.view-header{margin-bottom:20px}
.view-title-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.view-icon{font-size:20px}
.view-name{font-size:18px;font-weight:700;color:var(--text-bright)}
.view-count{font-size:12px;color:var(--text-muted);margin-left:auto}
.view-actions{display:flex;gap:8px}
.btn-action{display:flex;align-items:center;gap:6px;height:32px;padding:0 14px;background:var(--accent-soft);border:1px solid var(--accent-overlay-mid);border-radius:var(--radius-sm);color:var(--accent);font-size:13px;font-weight:600;transition:background var(--motion-fast),border-color var(--motion-fast),color var(--motion-fast)}
.btn-action:hover{background:var(--accent-overlay-mid);border-color:var(--accent);color:var(--accent-bright)}
.btn-action-secondary{display:flex;align-items:center;gap:6px;height:32px;padding:0 14px;background:var(--btn-bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-size:13px;font-weight:500;transition:background var(--motion-fast),color var(--motion-fast),border-color var(--motion-fast)}
.btn-action-secondary:hover{background:var(--btn-bg-hover);color:var(--text);border-color:var(--border-strong)}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.item-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-card);overflow:hidden;cursor:pointer;transition:border-color var(--motion-fast),box-shadow var(--motion-fast)}
.item-card:hover{border-color:var(--border);box-shadow:var(--shadow-sm)}
.item-thumb{height:100px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border-subtle)}
.folder-thumb{background:var(--accent-overlay-soft)}
.folder-icon{color:var(--accent);display:flex}
.mockup-thumb{background:var(--bg-elevated)}
.item-body{padding:10px 12px}
.item-name{font-size:13px;font-weight:600;color:var(--text-bright);display:block}
.item-meta{font-size:11px;color:var(--text-muted);margin-top:2px;display:block}

</style>
</head>
<body>

<div class="demo" style="padding:32px;max-width:700px">
  <div class="title">Project / Folder View</div>
  <div class="subtitle">Grid of mockups and subfolders within a project.</div>

  <div class="view-header">
    <div class="view-title-row">
      <span class="view-icon">🎨</span>
      <span class="view-name">Project Alpha</span>
      <span class="view-count">8 items</span>
    </div>
    <div class="view-actions">
      <button class="btn-action"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M14 7v1H8v6H7V8H1V7h6V1h1v6h6z"/></svg> New Mockup</button>
      <button class="btn-action-secondary"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M14.5 2H7.71l-.85-.85L6.51 1h-5l-.5.5v11l.5.5H7v-1H1.99V6h4.49l.35-.15.86-.86H14v1.5l-.001.51h1.011V2.5L14.5 2zm-.51 2h-6.5l-.35.15-.86.86H2v-3h4.29l.85.85.36.15H14l-.01.99zM13 16h-1v-3H9v-1h3V9h1v3h3v1h-3v3z"/></svg> New Folder</button>
    </div>
  </div>

  <div class="item-grid">
    <div class="item-card folder">
      <div class="item-thumb folder-thumb">
        <span class="folder-icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 14h11l.48-.37 2.63-7-.48-.63H14V3.5l-.5-.5H7.71l-.86-.85L6.5 2h-5l-.5.5v11l.5.5zM2 3h4.29l.86.85.35.15H13v2H8.5l-.35.15-.86.85H3.5l-.47.34-1 3.08L2 3zm10.13 10H2.19l1.67-5H7.5l.35-.15.86-.85h5.79l-2.37 6z"/></svg></span>
      </div>
      <div class="item-body">
        <span class="item-name">Landing</span>
        <span class="item-meta">3 mockups</span>
      </div>
    </div>
    <div class="item-card folder">
      <div class="item-thumb folder-thumb">
        <span class="folder-icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M14.5 3H7.71l-.85-.85L6.51 2h-5l-.5.5v11l.5.5h13l.5-.5v-10L14.5 3zm-.51 8.49V13h-12V7h4.49l.35-.15.86-.86H14v1.5l-.01 4zm0-6.49h-6.5l-.35.15-.86.86H2v-3h4.29l.85.85.36.15H14l-.01.99z"/></svg></span>
      </div>
      <div class="item-body">
        <span class="item-name">Pricing</span>
        <span class="item-meta">1 mockup</span>
      </div>
    </div>
    <div class="item-card mockup">
      <div class="item-thumb mockup-thumb"></div>
      <div class="item-body">
        <span class="item-name">Hero Banner</span>
        <span class="item-meta">v3 &middot; Updated 2h ago</span>
      </div>
    </div>
    <div class="item-card mockup">
      <div class="item-thumb mockup-thumb"></div>
      <div class="item-body">
        <span class="item-name">Presentation</span>
        <span class="item-meta">v1 &middot; Updated 1d ago</span>
      </div>
    </div>
  </div>
</div>

<div class="demo-label">12 &mdash; Project / Folder View</div>
</body>
</html>
