<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>05-project-card</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:oklch(11% 0.03 165);--bg-elevated:oklch(7% 0.02 165);--bg-card:oklch(12% 0.02 165);--bg-card-active:oklch(15% 0.025 165);--surface-hover:rgba(255,255,255,0.04);--surface-active:rgba(255,255,255,0.07);--border-subtle:oklch(17% 0.02 165);--border:oklch(21% 0.025 165);--border-strong:oklch(28% 0.025 165);--text-bright:oklch(97% 0.01 165);--text:oklch(82% 0.04 165);--text-dim:oklch(60% 0.02 165);--text-muted:oklch(47% 0.02 165);--accent:oklch(74.4% 0.193 165);--accent-bright:oklch(82% 0.18 165);--accent-soft:oklch(28% 0.08 165);--accent-overlay-soft:oklch(74.4% 0.193 165/0.18);--accent-overlay-mid:oklch(74.4% 0.193 165/0.35);--btn-bg:rgb(39,39,39);--btn-bg-hover:rgb(48,48,48);--danger:oklch(70% 0.2 25);--danger-soft:oklch(28% 0.09 25);--success:oklch(76% 0.16 152);--warning:oklch(80% 0.15 80);--font-body:"Manrope",system-ui,sans-serif;--font-mono:"JetBrains Mono",monospace;--ease-standard:cubic-bezier(0.32,0.72,0,1);--ease-spring:cubic-bezier(0.5,1.4,0.6,1);--ease-exit:cubic-bezier(0.32,0,0.67,0);--motion-fast:160ms;--motion-base:220ms;--topbar-height:52px;--sidebar-width:280px;--sidebar-collapsed-width:52px;--radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-card:14px;--radius-pill:9999px;--shadow-sm:0 2px 6px oklch(0%,0,0/0.45);--shadow-md:0 6px 16px oklch(0%,0,0/0.5);--shadow-glow:0 0 0 1px oklch(74.4% 0.193 165/0.4),0 0 24px oklch(74.4% 0.193 165/0.18);--shadow-popover:0 14px 32px oklch(0%,0,0/0.6),0 6px 12px oklch(0%,0,0/0.45),inset 0 1px 0 oklch(100%,0,0/0.06);--scrim-strong:oklch(0% 0 0/0.65);--focus-ring:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
@media(prefers-reduced-motion:reduce){:root{--motion-fast:0ms;--motion-base:0ms}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}input,textarea{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:var(--radius-xs)}
mark{background:var(--accent-overlay-mid);color:var(--accent-bright);border-radius:2px;padding:0 1px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--radius-pill)}
.demo-label{position:fixed;bottom:16px;right:16px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;z-index:999}

html,body{overflow:auto}
.demo{padding:32px;max-width:900px;margin:0 auto}
.title{font-size:20px;font-weight:700;color:var(--text-bright);margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text-dim);margin-bottom:24px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.project-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-card);overflow:hidden;transition:border-color var(--motion-fast),box-shadow var(--motion-fast);cursor:pointer}
.project-card:hover{border-color:var(--border);box-shadow:var(--shadow-sm)}
.card-thumb{height:140px;background:var(--bg-elevated);border-bottom:1px solid var(--border-subtle);position:relative}
.card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,0.15))}
.card-body{display:flex;align-items:center;gap:8px;padding:12px}
.card-icon{font-size:18px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:600;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.card-kebab{width:28px;height:28px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;color:var(--text-muted);opacity:0;transition:opacity var(--motion-fast),background var(--motion-fast);flex-shrink:0}
.project-card:hover .card-kebab{opacity:1}
.card-kebab:hover{background:var(--surface-active);color:var(--text)}

</style>
</head>
<body>

<div class="demo">
  <div class="title">Project Card</div>
  <div class="subtitle">Card with thumbnail, title, item count and kebab menu.</div>
  <div class="card-grid">
    <div class="project-card">
      <div class="card-thumb"></div>
      <div class="card-body">
        <span class="card-icon">🎨</span>
        <div class="card-info">
          <div class="card-name">Project Alpha</div>
          <div class="card-meta">8 mockups &middot; Updated 2h ago</div>
        </div>
        <button class="card-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></button>
      </div>
    </div>
    <div class="project-card">
      <div class="card-thumb"></div>
      <div class="card-body">
        <span class="card-icon">📐</span>
        <div class="card-info">
          <div class="card-name">Project Beta</div>
          <div class="card-meta">1 mockup &middot; Updated 1d ago</div>
        </div>
        <button class="card-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></button>
      </div>
    </div>
    <div class="project-card">
      <div class="card-thumb"></div>
      <div class="card-body">
        <span class="card-icon">🚀</span>
        <div class="card-info">
          <div class="card-name">Project Gamma with a Longer Name</div>
          <div class="card-meta">3 mockups &middot; Updated 5d ago</div>
        </div>
        <button class="card-kebab"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg></button>
      </div>
    </div>
  </div>
</div>
<div class="demo-label">05-project-card</div>

</body>
</html>
