<!--
  VARIANTE E — COMMAND-PALETTE CENTRIC: VOID TERMINAL
  Markup Protótipos v2 — baseado em UX Spec formal MARA-19

  Direção estética: O Finder É o produto — glassmorphism escuro extremo

  Tipografia:
  - Botão buscar topbar: Manrope 500, placeholder-style
  - Hero input palette: Manrope 700, 18px, tracking -0.015em
  - Resultados: Manrope 500, 14px
  - Paths: JetBrains Mono 400, 12px, --text-muted
  - Shortcuts: JetBrains Mono 500, 11px
  - Labels seção: Manrope 600, 10px, uppercase, tracking 0.12em

  Palette/Design:
  - Sidebar: translúcida rgba(14,12,16,0.8) + backdrop-filter blur(12px)
  - Command palette: bg-elevated + backdrop-filter blur(20px) — glassmorphism DARK
  - Accent na border da palette + highlights de match + item ativo
  - Scrim oklch(0%,0,0/0.65) quando palette aberta
  - Shadow-glow assinatura da palette

  Motion:
  - Palette open: 180ms ease-spring (scale 0.97→1 + opacity 0→1)
  - Palette close: 120ms ease-exit
  - Resultados: stagger 20ms por item
  - Sidebar: 220ms ease-standard
  - Toast: 150ms in / 250ms out

  Spec: MARA-19 ux-spec (sidebar 320px, 3 níveis max, home root /,
  finder ≥3 chars debounce 300ms fuzzy, logout sem modal, toast undo 5s,
  Unsorted virtual project, drag auto-expand 600ms)
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MARA — Variante E: Void Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────────────── */
    :root {
      --bg: oklch(11% 0.03 165);
      --bg-elevated: oklch(7% 0.02 165);
      --bg-card: oklch(12% 0.02 165);
      --bg-card-active: oklch(15% 0.025 165);
      --bg-tinted: oklch(9% 0.02 165);
      --btn-bg: rgb(39, 39, 39);
      --btn-bg-hover: rgb(48, 48, 48);
      --btn-bg-active: rgb(56, 56, 56);
      --surface-hover: rgba(255,255,255,0.04);
      --surface-active: rgba(255,255,255,0.07);
      --border-subtle: oklch(17% 0.02 165);
      --border: oklch(21% 0.025 165);
      --border-strong: oklch(28% 0.025 165);
      --text-bright: oklch(97% 0.01 165);
      --text: oklch(82% 0.04 165);
      --text-dim: oklch(60% 0.02 165);
      --text-muted: oklch(47% 0.02 165);
      --accent: oklch(74.4% 0.193 165);
      --accent-bright: oklch(82% 0.18 165);
      --accent-soft: oklch(28% 0.08 165);
      --accent-overlay-soft: oklch(74.4% 0.193 165 / 0.18);
      --accent-overlay-mid: oklch(74.4% 0.193 165 / 0.35);
      --success: oklch(76% 0.16 152);
      --warning: oklch(80% 0.15 80);
      --danger: oklch(70% 0.2 25);
      --danger-soft: oklch(28% 0.09 25);
      --danger-border: oklch(40% 0.1 25);
      --focus-ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
      --shadow-glow: 0 0 0 1px oklch(74.4% 0.193 165 / 0.4), 0 0 24px oklch(74.4% 0.193 165 / 0.18);
      --shadow-popover: 0 14px 32px oklch(0%,0,0/0.6), 0 6px 12px oklch(0%,0,0/0.45), inset 0 1px 0 oklch(100%,0,0/0.06);
      --scrim-strong: oklch(0% 0 0 / 0.65);
      --font-body: "Manrope", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      --ease-standard: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-spring: cubic-bezier(0.5, 1.4, 0.6, 1);
      --ease-exit: cubic-bezier(0.32, 0, 0.67, 0);
      --motion-fast: 160ms;
      --motion-base: 220ms;
      --topbar-height: 60px;
      --sidebar-width: 320px;
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-card: 14px;
      --radius-pill: 9999px;
      --shadow-sm: 0 2px 6px oklch(0%,0,0/0.45);
      --shadow-md: 0 6px 16px oklch(0%,0,0/0.5);
    }
    @media (prefers-reduced-motion: reduce) {
      :root { --motion-fast: 0ms; --motion-base: 0ms; }
    }

    /* ─── RESET & BASE ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--radius-xs); }
    mark { background: var(--accent-overlay-mid); color: var(--accent-bright); border-radius: 2px; padding: 0 1px; }

    /* ─── SCROLLBAR ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ─── LAYOUT SHELL ──────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
    }

    /* ─── TOPBAR ────────────────────────────────────────────────── */
    #topbar {
      height: var(--topbar-height);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      position: relative;
      z-index: 100;
      flex-shrink: 0;
    }
    .topbar-logo {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 16px;
      color: var(--text-bright);
      letter-spacing: -0.02em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .topbar-logo span {
      color: var(--accent);
    }
    .topbar-icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--motion-fast), color var(--motion-fast);
      flex-shrink: 0;
    }
    .topbar-icon-btn:hover { background: var(--surface-hover); color: var(--text); }
    .topbar-icon-btn:active { background: var(--surface-active); }
    .topbar-spacer { flex: 1; }

    /* Search pill — centrepiece of the topbar */
    #topbar-search-pill {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      height: 38px;
      padding: 0 14px 0 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-dim);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 13.5px;
      cursor: pointer;
      transition: background var(--motion-fast), border-color var(--motion-fast), box-shadow var(--motion-fast), color var(--motion-fast);
      white-space: nowrap;
      min-width: 260px;
      max-width: 380px;
    }
    #topbar-search-pill:hover {
      background: var(--bg-card-active);
      border-color: var(--border-strong);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    #topbar-search-pill svg { flex-shrink: 0; color: var(--text-muted); }
    .search-pill-text { flex: 1; }
    .search-pill-kbd {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 2px 6px;
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }

    /* Topbar right actions */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-left: auto;
    }
    .btn-new-mockup {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 14px;
      background: var(--accent);
      color: var(--bg);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: -0.01em;
      transition: background var(--motion-fast), transform var(--motion-fast);
    }
    .btn-new-mockup:hover { background: var(--accent-bright); }
    .btn-new-mockup:active { transform: scale(0.98); }

    /* Avatar + menu */
    .avatar-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-pill);
      background: var(--accent-soft);
      border: 1.5px solid var(--accent-overlay-mid);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: border-color var(--motion-fast);
    }
    .avatar-btn:hover { border-color: var(--accent); }
    .more-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      letter-spacing: 1px;
      transition: background var(--motion-fast), color var(--motion-fast);
      position: relative;
    }
    .more-btn:hover { background: var(--surface-hover); color: var(--text); }

    /* Dropdown menu */
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-popover);
      min-width: 180px;
      z-index: 500;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.95) translateY(-4px);
      transform-origin: top right;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-exit), transform var(--motion-fast) var(--ease-exit);
    }
    .dropdown-menu.open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      transition: opacity var(--motion-fast) var(--ease-spring), transform var(--motion-fast) var(--ease-spring);
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--motion-fast);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .dropdown-item:hover { background: var(--surface-hover); }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item.danger:hover { background: var(--danger-soft); }
    .dropdown-divider { height: 1px; background: var(--border-subtle); margin: 4px 0; }

    /* ─── BODY LAYOUT ───────────────────────────────────────────── */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ─── SIDEBAR ───────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-width);
      background: rgba(14, 12, 16, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width var(--motion-base) var(--ease-standard), transform var(--motion-base) var(--ease-standard);
      position: relative;
      z-index: 50;
    }
    #sidebar.collapsed {
      width: 0;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 16px 8px;
      flex-shrink: 0;
    }
    .sidebar-section-label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 16px 4px;
    }
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 8px;
    }

    /* Tree nav */
    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px 0 0;
      height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
      transition: background var(--motion-fast), color var(--motion-fast);
      user-select: none;
    }
    .tree-item:hover { background: var(--surface-hover); color: var(--text); }
    .tree-item.active {
      background: var(--accent-overlay-soft);
      color: var(--accent-bright);
    }
    .tree-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }
    .tree-indent-1 { padding-left: 12px; }
    .tree-indent-2 { padding-left: 28px; }
    .tree-indent-3 { padding-left: 44px; }
    .tree-chevron {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: transform var(--motion-fast);
    }
    .tree-chevron.open { transform: rotate(90deg); }
    .tree-icon { font-size: 13px; flex-shrink: 0; line-height: 1; }
    .tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tree-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-pill);
      padding: 1px 5px;
      flex-shrink: 0;
    }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 10px 12px 14px;
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .btn-new-project {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      height: 34px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      background: var(--surface-hover);
      border: 1px solid var(--border-subtle);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--motion-fast), color var(--motion-fast), border-color var(--motion-fast);
    }
    .btn-new-project:hover {
      background: var(--surface-active);
      color: var(--text);
      border-color: var(--border);
    }

    /* ─── MAIN CONTENT ──────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .main-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 40px;
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .breadcrumb-item {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: color var(--motion-fast);
    }
    .breadcrumb-item:hover { color: var(--text); }
    .breadcrumb-item.active { color: var(--text-bright); cursor: default; }
    .breadcrumb-sep { color: var(--text-muted); font-size: 13px; }

    /* Page title */
    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    /* Home sections */
    .home-section { margin-bottom: 40px; }
    .home-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .home-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .home-section-action {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: color var(--motion-fast);
      background: none;
      border: none;
      font-family: inherit;
    }
    .home-section-action:hover { color: var(--accent); }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-card);
      padding: 18px 18px 16px;
      cursor: pointer;
      transition: background var(--motion-fast), border-color var(--motion-fast), transform var(--motion-fast), box-shadow var(--motion-fast);
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      background: var(--bg-card-active);
      border-color: var(--border);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .card:active { transform: translateY(0); }
    .card-icon {
      font-size: 22px;
      margin-bottom: 12px;
      line-height: 1;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      margin-top: 10px;
    }
    .badge-warning {
      background: oklch(80% 0.15 80 / 0.15);
      color: var(--warning);
      border: 1px solid oklch(80% 0.15 80 / 0.3);
    }
    .badge-success {
      background: oklch(76% 0.16 152 / 0.12);
      color: var(--success);
      border: 1px solid oklch(76% 0.16 152 / 0.25);
    }
    .card.archived { opacity: 0.6; }
    .card.drag-source { opacity: 0.4; }
    .card.drop-target {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-overlay-mid);
    }

    /* Recent list */
    .recent-list { display: flex; flex-direction: column; gap: 2px; }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--motion-fast);
    }
    .recent-item:hover { background: var(--surface-hover); }
    .recent-item-icon { font-size: 15px; flex-shrink: 0; }
    .recent-item-info { flex: 1; min-width: 0; }
    .recent-item-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-item-path {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-item-time {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ─── EMPTY STATES ──────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 32px;
      text-align: center;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    .empty-state-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .empty-state-desc {
      font-size: 13.5px;
      color: var(--text-dim);
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .empty-state-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 8px 14px;
      border-radius: var(--radius-pill);
    }
    .empty-state-hint kbd {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
    }

    /* ─── SKELETON ──────────────────────────────────────────────── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-active) 50%, var(--bg-card) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: var(--radius-sm);
    }
    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-card);
      padding: 18px;
      height: 110px;
    }
    .skeleton-line {
      height: 12px;
      margin-bottom: 8px;
    }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }
    .skeleton-line.full { width: 100%; }
    .skeleton-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
    }

    /* ─── DRAG OVERLAY ──────────────────────────────────────────── */
    .drag-ghost {
      position: fixed;
      top: 120px;
      left: 50%;
      transform: translateX(-50%) rotate(2deg);
      background: var(--bg-card);
      border: 1px solid var(--accent);
      border-radius: var(--radius-card);
      padding: 14px 20px;
      box-shadow: var(--shadow-glow), var(--shadow-md);
      pointer-events: none;
      z-index: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-bright);
    }
    .drop-indicator {
      position: absolute;
      height: 2px;
      background: var(--accent);
      border-radius: var(--radius-pill);
      box-shadow: 0 0 8px var(--accent);
      pointer-events: none;
    }

    /* ─── ARCHIVE VIEW ──────────────────────────────────────────── */
    .archive-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-restore {
      flex: 1;
      height: 30px;
      background: var(--accent-overlay-soft);
      border: 1px solid var(--accent-overlay-mid);
      color: var(--accent);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--motion-fast);
    }
    .btn-restore:hover { background: var(--accent-overlay-mid); }
    .btn-delete {
      flex: 1;
      height: 30px;
      background: var(--danger-soft);
      border: 1px solid var(--danger-border);
      color: var(--danger);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--motion-fast);
    }
    .btn-delete:hover { background: oklch(30% 0.1 25); }

    /* ─── COMMAND PALETTE ───────────────────────────────────────── */
    #palette-scrim {
      position: fixed;
      inset: 0;
      background: var(--scrim-strong);
      z-index: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-exit);
    }
    #palette-scrim.open {
      opacity: 1;
      pointer-events: auto;
      transition: opacity var(--motion-fast) var(--ease-spring);
    }

    #palette-container {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) scale(0.97);
      width: min(640px, 92vw);
      background: var(--bg-elevated);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-glow), var(--shadow-popover);
      z-index: 1000;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms var(--ease-exit), transform 120ms var(--ease-exit);
    }
    #palette-container.open {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: auto;
      transition: opacity 180ms var(--ease-spring), transform 180ms var(--ease-spring);
    }

    /* Palette input */
    .palette-input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 64px;
      flex-shrink: 0;
    }
    .palette-search-icon { color: var(--text-muted); flex-shrink: 0; }
    #palette-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 18px;
      color: var(--text-bright);
      letter-spacing: -0.015em;
      caret-color: var(--accent);
    }
    #palette-input::placeholder { color: var(--text-muted); font-weight: 500; }
    .palette-esc-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 3px 7px;
      flex-shrink: 0;
      cursor: pointer;
      transition: color var(--motion-fast), border-color var(--motion-fast);
    }
    .palette-esc-badge:hover { color: var(--text); border-color: var(--border-strong); }
    .palette-divider { height: 1px; background: var(--border-subtle); flex-shrink: 0; }

    /* Palette results */
    #palette-results {
      max-height: 360px;
      overflow-y: auto;
      padding: 6px 0;
    }
    .palette-section-label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 16px 4px;
    }
    .palette-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 44px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background var(--motion-fast), border-color var(--motion-fast);
      animation: palette-item-in 200ms var(--ease-spring) backwards;
    }
    @keyframes palette-item-in {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .palette-item:hover { background: var(--surface-hover); }
    .palette-item.selected {
      background: var(--accent-overlay-soft);
      border-left-color: var(--accent);
    }
    .palette-item-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .palette-item-info { flex: 1; min-width: 0; }
    .palette-item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .palette-item-path {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .palette-item-time {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .palette-item-shortcut {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xs);
      padding: 2px 6px;
      flex-shrink: 0;
    }

    /* Palette empty */
    .palette-empty {
      padding: 40px 20px;
      text-align: center;
    }
    .palette-empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
    .palette-empty-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .palette-empty-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* Palette footer */
    .palette-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .palette-footer-hint {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }
    .palette-footer-hint kbd {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }
    .palette-result-count {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ─── TOAST ─────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 10px 16px 10px 14px;
      box-shadow: var(--shadow-popover);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
      pointer-events: auto;
      white-space: nowrap;
      animation: toast-in 150ms var(--ease-spring) forwards;
    }
    .toast.out {
      animation: toast-out 250ms var(--ease-exit) forwards;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(8px) scale(0.95); }
    }
    .toast-icon { font-size: 15px; flex-shrink: 0; }
    .toast-text { flex: 1; }
    .toast-action {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      transition: color var(--motion-fast);
    }
    .toast-action:hover { color: var(--accent-bright); }
    .toast-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      border-radius: var(--radius-pill);
      animation: toast-progress 5s linear forwards;
    }
    @keyframes toast-progress {
      from { width: 100%; }
      to { width: 0%; }
    }

    /* ─── STATES SWITCHER ───────────────────────────────────────── */
    #states-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 3000;
    }
    #states-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 38px;
      padding: 0 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-md);
      color: var(--text-dim);
      font-size: 12.5px;
      font-weight: 600;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: background var(--motion-fast), color var(--motion-fast), border-color var(--motion-fast);
    }
    #states-toggle:hover {
      background: var(--bg-card);
      color: var(--text);
      border-color: var(--accent);
    }
    #states-menu {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-popover);
      min-width: 280px;
      max-height: 480px;
      overflow-y: auto;
      z-index: 3001;
      opacity: 0;
      transform: scale(0.95) translateY(6px);
      transform-origin: bottom right;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-exit), transform var(--motion-fast) var(--ease-exit);
    }
    #states-menu.open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      transition: opacity var(--motion-fast) var(--ease-spring), transform var(--motion-fast) var(--ease-spring);
    }
    .states-menu-header {
      padding: 10px 14px 6px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-subtle);
    }
    .state-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background var(--motion-fast);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .state-item:hover { background: var(--surface-hover); }
    .state-item.active { background: var(--accent-overlay-soft); }
    .state-num {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      min-width: 18px;
    }
    .state-item.active .state-num { color: var(--accent); }
    .state-label {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-dim);
    }
    .state-item.active .state-label { color: var(--accent-bright); }

    /* ─── DRAG INDICATOR ────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-card);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 12px;
      transition: border-color var(--motion-fast), background var(--motion-fast);
    }
    .drop-zone.active {
      border-color: var(--accent);
      background: var(--accent-overlay-soft);
      color: var(--accent);
    }

    /* ─── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-width: 280px; }
      #sidebar {
        position: fixed;
        top: var(--topbar-height);
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        transition: transform var(--motion-base) var(--ease-standard);
        z-index: 200;
      }
      #sidebar.mobile-open {
        transform: translateX(0);
      }
      #sidebar.collapsed {
        transform: translateX(-100%);
        width: var(--sidebar-width);
      }
      #topbar-search-pill {
        min-width: 0;
        padding: 0 10px;
      }
      .search-pill-text { display: none; }
      .btn-new-mockup span { display: none; }
      .main-scroll { padding: 20px 16px 32px; }
      .cards-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- ── TOPBAR ── -->
  <header id="topbar" role="banner">
    <span class="topbar-logo">MA<span>RA</span></span>

    <button class="topbar-icon-btn" id="sidebar-toggle-btn" aria-label="Alternar sidebar" title="Alternar sidebar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="4" width="14" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="8.25" width="9" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="12.5" width="14" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
    </button>

    <!-- Centrepiece pill -->
    <button id="topbar-search-pill" aria-label="Abrir busca (⌘K)" title="Buscar... ⌘K">
      <svg class="" width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M6.5 1a5.5 5.5 0 1 0 3.67 9.61l2.86 2.86a.75.75 0 1 0 1.06-1.06l-2.86-2.86A5.5 5.5 0 0 0 6.5 1Zm-4 5.5a4 4 0 1 1 8 0 4 4 0 0 1-8 0Z" fill="currentColor"/>
      </svg>
      <span class="search-pill-text">Buscar...</span>
      <span class="search-pill-kbd">⌘K</span>
    </button>

    <div class="topbar-spacer"></div>

    <div class="topbar-right">
      <button class="btn-new-mockup" id="new-mockup-btn" aria-label="Novo mockup">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Novo Mockup</span>
      </button>
      <div class="avatar-btn" role="button" tabindex="0" aria-label="Perfil do usuário">A</div>
      <div style="position:relative;">
        <button class="more-btn" id="more-btn" aria-label="Mais opções" aria-haspopup="true" aria-expanded="false">···</button>
        <div class="dropdown-menu" id="more-dropdown" role="menu" aria-label="Opções do usuário">
          <button class="dropdown-item" role="menuitem">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="4" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 11c0-2.21 2.24-4 5-4s5 1.79 5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Perfil
          </button>
          <button class="dropdown-item" role="menuitem">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM7 4v3l2 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Configurações
          </button>
          <button class="dropdown-item" role="menuitem">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 7h6M7 4v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            /archive
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" role="menuitem" id="logout-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 7h7m0 0-2.5-2.5M12 7l-2.5 2.5M9 4V3a1.5 1.5 0 0 0-1.5-1.5h-5A1.5 1.5 0 0 0 1 3v8a1.5 1.5 0 0 0 1.5 1.5h5A1.5 1.5 0 0 0 9 11v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Sair
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── BODY ── -->
  <div id="body">
    <!-- SIDEBAR -->
    <nav id="sidebar" role="tree" aria-label="Navegação de projetos">
      <div class="sidebar-scroll">
        <div class="sidebar-section-label">Projetos</div>

        <!-- Alpha -->
        <div class="tree-item tree-indent-1" role="treeitem" aria-expanded="true" aria-level="1" data-project="alpha" id="tree-alpha">
          <span class="tree-chevron open">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l4 3-4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="tree-icon">🎨</span>
          <span class="tree-label">Alpha</span>
          <span class="tree-count">8</span>
        </div>
        <!-- Alpha > Landing -->
        <div class="tree-item tree-indent-2 alpha-child" role="treeitem" aria-expanded="true" aria-level="2" data-folder="landing" id="tree-landing">
          <span class="tree-chevron open">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l4 3-4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="tree-icon">📁</span>
          <span class="tree-label">Landing</span>
        </div>
        <!-- Alpha > Landing > Hero -->
        <div class="tree-item tree-indent-3 landing-child" role="treeitem" aria-level="3" data-folder="hero">
          <span class="tree-icon">📂</span>
          <span class="tree-label">Hero</span>
        </div>
        <!-- Alpha > Landing > Banner -->
        <div class="tree-item tree-indent-3 landing-child" role="treeitem" aria-level="3" data-mockup="banner">
          <span class="tree-icon">🖼</span>
          <span class="tree-label">Banner</span>
        </div>
        <!-- Alpha > Pricing -->
        <div class="tree-item tree-indent-2 alpha-child" role="treeitem" aria-expanded="false" aria-level="2" data-folder="pricing" id="tree-pricing">
          <span class="tree-chevron">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l4 3-4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="tree-icon">📁</span>
          <span class="tree-label">Pricing</span>
        </div>
        <!-- Alpha > Apresentação -->
        <div class="tree-item tree-indent-2 alpha-child" role="treeitem" aria-level="2" data-mockup="apresentacao">
          <span class="tree-icon">🖼</span>
          <span class="tree-label">Apresentação</span>
        </div>

        <!-- Beta -->
        <div class="tree-item tree-indent-1" role="treeitem" aria-expanded="false" aria-level="1" data-project="beta" id="tree-beta">
          <span class="tree-chevron">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l4 3-4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="tree-icon">📐</span>
          <span class="tree-label">Beta</span>
          <span class="tree-count">3</span>
        </div>

        <!-- Unsorted (virtual, always last) -->
        <div class="sidebar-section-label" style="margin-top:8px;">Sem Projeto</div>
        <div class="tree-item tree-indent-1" role="treeitem" aria-level="1" data-project="unsorted">
          <span class="tree-icon">📌</span>
          <span class="tree-label">Unsorted</span>
          <span class="tree-count">1</span>
        </div>
      </div>

      <div class="sidebar-footer">
        <button class="btn-new-project" id="new-project-btn">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          New Project
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <main id="main" role="main">
      <div class="main-scroll" id="main-scroll">
        <!-- Content injected by JS -->
      </div>
    </main>
  </div>
</div>

<!-- ── COMMAND PALETTE ── -->
<div id="palette-scrim" aria-hidden="true" role="presentation"></div>

// ─── HELPERS ──────────────────────────────────────────────────
function highlightMatch(text, query) {
  if (!query || query.length < 3) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const escapedQ = escapeHtml(query);
  const regex = new RegExp(`(${escapedQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyMatch(text, query) {
  const t = text.toLowerCase(), q = query.toLowerCase();
  if (t.includes(q)) return true;
  if (q.length >= 3) {
    for (let i=0; i<=t.length-q.length+1; i++) {
      if (levenshtein(t.slice(i, i+q.length), q) <= 1) return true;
    }
  }
  return false;
}

  toast.style.position = 'relative';
  toast.style.overflow = 'hidden';
  toast.innerHTML = `
    <span class="toast-icon">${icon}</span>
    <span class="toast-text">${escapeHtml(msg)}</span>
    ${action ? `<button class="toast-action">${escapeHtml(action)}</button>` : ''}
    <div class="toast-progress"></div>
  `;
  if (action && onAction) {
    toast.querySelector('.toast-action').addEventListener('click', () => {
      onAction();
      dismissToast(toast);
    });
  }
  els.toastContainer.appendChild(toast);
  const timer = setTimeout(() => dismissToast(toast), 5000);
  toast._timer = timer;
  return toast;
}

function dismissToast(toast) {
  clearTimeout(toast._timer);
  toast.classList.add('out');

}

        <div class="palette-item-path">${proj.count} itens</div>

  els.paletteResults.innerHTML = html;
  els.paletteCount.textContent = '';
  attachItemListeners();
}

function renderPaletteResults(query) {
  // Check for preset "hero" search results
  const q = query.toLowerCase().trim();
  const lowerKey = Object.keys(MOCK.searchResults).find(k => q.includes(k));

  let results = [];
  if (lowerKey && query.length >= 3) {
    results = MOCK.searchResults[lowerKey];
  } else if (query.length >= 3) {
    // Dynamic fuzzy search through all items
    const allItems = [];
    MOCK.projects.forEach(proj => {
      allItems.push({ id: proj.id, name: proj.name, icon: proj.icon, path: '/', type: 'project' });
      (proj.folders || []).forEach(folder => {
        allItems.push({ id: folder.id, name: folder.name, icon: folder.icon, path: proj.name, type: 'folder' });
        (folder.folders || []).forEach(sub => {
          const p = sub.mockups ? sub : sub;
          allItems.push({ id: p.id, name: p.name, icon: p.icon, path: `${proj.name} / ${folder.name}`, type: 'folder' });
          (p.mockups || []).forEach(m => {
            allItems.push({ id: m.id, name: m.name, icon: m.icon, path: m.path, type: 'mockup' });
          });
        });
        (folder.mockups || []).forEach(m => {
          allItems.push({ id: m.id, name: m.name, icon: m.icon, path: m.path, type: 'mockup' });
        });
      });
    });
    results = allItems.filter(item => fuzzyMatch(item.name, query)).slice(0, 8);
  }

  if (results.length === 0 && query.length >= 3) {
    els.paletteResults.innerHTML = `
      <div class="palette-empty">
        <div class="palette-empty-icon">🔍</div>
        <div class="palette-empty-text">Nenhum resultado para "${escapeHtml(query)}"</div>
        <div class="palette-empty-sub">Tente outro termo ou crie um novo item</div>
      </div>`;
    els.paletteCount.textContent = '0 resultados';
    return;
  }

  if (query.length < 3) {
    renderPaletteDefault();
    return;
  }

  // Group results by type
  const mockups = results.filter(r => r.type === 'mockup' || r.icon === '🖼' || !r.type);
  const folders = results.filter(r => r.type === 'folder' || r.icon === '📂' || r.icon === '📁');
  const projects = results.filter(r => r.type === 'project' || r.icon === '🎨' || r.icon === '📐');

  let html = '';
  let idx = 0;

  if (mockups.length || folders.length) {
    html += `<div class="palette-section-label">MOCKUPS &amp; PASTAS</div>`;
    [...mockups, ...folders].forEach(item => {
      html += renderPaletteItem(item, idx, query);
      idx++;
    });
  }
  if (projects.length) {
    html += `<div class="palette-section-label">PROJETOS</div>`;
    projects.forEach(item => {
      html += renderPaletteItem(item, idx, query);
      idx++;
    });
  }

  els.paletteResults.innerHTML = html;
  els.paletteCount.textContent = `${results.length} resultado${results.length !== 1 ? 's' : ''}`;
  attachItemListeners();
}

function renderPaletteItem(item, idx, query) {
  const highlighted = highlightMatch(item.name, query);
  return `<div class="palette-item" role="option" aria-selected="false" data-index="${idx}" style="animation-delay:${idx*20}ms">
    <div class="palette-item-icon">${item.icon}</div>
    <div class="palette-item-info">
      <div class="palette-item-name">${highlighted}</div>
      <div class="palette-item-path">${escapeHtml(item.path || '')}</div>
    </div>
    <span class="palette-item-shortcut">↵</span>
  </div>`;
}

function attachItemListeners() {
  $$('#palette-results .palette-item').forEach(item => {
    item.addEventListener('click', () => {
      closePalette();
      showToast(`Abrindo ${item.querySelector('.palette-item-name').textContent}`, '📂');
    });
    item.addEventListener('mouseenter', () => {
      const idx = parseInt(item.dataset.index);
      selectPaletteItem(idx);
    });
  });
}

function selectPaletteItem(idx) {
  const items = $$('#palette-results .palette-item');
  items.forEach((el, i) => {
    const selected = i === idx;
    el.classList.toggle('selected', selected);
    el.setAttribute('aria-selected', selected ? 'true' : 'false');
  });
  state.selectedIndex = idx;
}

function navigatePalette(dir) {
  const items = $$('#palette-results .palette-item');
  if (!items.length) return;
  let next = state.selectedIndex + dir;
  if (next < 0) next = items.length - 1;
  if (next >= items.length) next = 0;
  selectPaletteItem(next);
  items[next]?.scrollIntoView({ block: 'nearest' });
}

function activateSelected() {
  const items = $$('#palette-results .palette-item');
  if (state.selectedIndex >= 0 && items[state.selectedIndex]) {
    items[state.selectedIndex].click();
  }
}

// ─── STATE SWITCHER ───────────────────────────────────────────
function switchState(id) {
  state.currentView = id;
  renderMain(id);
  updateStatesMenu();
}

function updateStatesMenu() {
  const items = els.statesMenu.querySelectorAll('.state-item');
  items.forEach(item => {
    item.classList.toggle('active', parseInt(item.dataset.state) === state.currentView);
  });
}

function buildStatesMenu() {
  let html = `<div class="states-menu-header">16 estados — MARA-19</div>`;
  STATES.forEach(s => {
    html += `<button class="state-item${s.id === state.currentView ? ' active' : ''}" role="option" data-state="${s.id}">
      <span class="state-num">${String(s.id).padStart(2, '0')}</span>
      <span class="state-label">${escapeHtml(s.label)}</span>
    </button>`;
  });
  els.statesMenu.innerHTML = html;
  els.statesMenu.querySelectorAll('.state-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = parseInt(item.dataset.state);
      switchState(id);
      toggleStatesMenu(false);
    });
  });
}

function toggleStatesMenu(force) {
  const open = force !== undefined ? force : !state.statesMenuOpen;
  state.statesMenuOpen = open;
  els.statesMenu.classList.toggle('open', open);
  els.statesToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
}

// ─── DROPDOWN ─────────────────────────────────────────────────
function toggleDropdown(force) {
  const open = force !== undefined ? force : !state.dropdownOpen;
  state.dropdownOpen = open;
  els.moreDropdown.classList.toggle('open', open);
  els.moreBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
}

// ─── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const meta = e.metaKey || e.ctrlKey;

  // ⌘K opens palette
  if (meta && e.key === 'k') {
    e.preventDefault();
    if (state.paletteOpen) closePalette();
    else openPalette();
    return;
  }

  if (state.paletteOpen) {
    if (e.key === 'Escape') { e.preventDefault(); closePalette(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); navigatePalette(1); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); navigatePalette(-1); return; }
    if (e.key === 'Enter') { e.preventDefault(); activateSelected(); return; }

    // Focus trap
    if (e.key === 'Tab') {
      e.preventDefault();
      const focusable = state.focusableEls;
      if (!focusable.length) return;
      const currentIndex = focusable.indexOf(document.activeElement);
      if (e.shiftKey) {
        const prev = currentIndex <= 0 ? focusable.length - 1 : currentIndex - 1;
        focusable[prev].focus();
      } else {
        const next = currentIndex >= focusable.length - 1 ? 0 : currentIndex + 1;
        focusable[next].focus();
      }
    }
  }

  // Close dropdowns on Escape
  if (e.key === 'Escape') {
    if (state.dropdownOpen) toggleDropdown(false);
    if (state.statesMenuOpen) toggleStatesMenu(false);
  }
});

// ─── EVENT LISTENERS ──────────────────────────────────────────
// Topbar search pill
els.topbarSearchPill.addEventListener('click', () => openPalette());

// Sidebar toggle
els.sidebarToggleBtn.addEventListener('click', toggleSidebar);

// Palette scrim click
els.paletteScrim.addEventListener('click', closePalette);

// Palette esc btn
els.paletteEscBtn.addEventListener('click', closePalette);

// Palette input
els.paletteInput.addEventListener('input', () => {
  const val = els.paletteInput.value;
  state.paletteQuery = val;
  clearTimeout(state.debounceTimer);
  state.debounceTimer = setTimeout(() => {
    if (val.length >= 3) {
      renderPaletteResults(val);
    } else if (val.length === 0) {
      renderPaletteDefault();
    }
    state.selectedIndex = -1;
    els.paletteInput.setAttribute('aria-expanded', val.length > 0 ? 'true' : 'false');
  }, 300);
});

// More dropdown
els.moreBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleDropdown();
});

// Logout

  toggleDropdown(false);
  // POST /api/auth/logout → redirect to /login (mocked)
  showToast('Sessão encerrada. Redirecionando...', '👋');
  setTimeout(() => {
    // window.location.href = '/login'; // would navigate in real app
  }, 2000);
});

// States toggle
els.statesToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleStatesMenu();
});

// New mockup

  showToast('Novo mockup criado', '✨', 'Desfazer', () => {
    showToast('Criação desfeita', '↩');

  showToast('Novo projeto criado', '🎨', 'Desfazer', () => {
    showToast('Criação desfeita', '↩');
  });
});

// Tree items interactivity
document.querySelectorAll('.tree-item').forEach(item => {
  item.addEventListener('click', (e) => {
    const chevron = item.querySelector('.tree-chevron');
    if (chevron) {
      chevron.classList.toggle('open');
      const expanded = chevron.classList.contains('open');
      item.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    }
    // Navigate based on data attributes
    if (item.dataset.project === 'alpha') switchState(5);
    else if (item.dataset.folder === 'landing') switchState(6);
    else if (item.dataset.folder === 'pricing') switchState(12);
    else if (item.dataset.project === 'beta') switchState(11);
  });
});

// Close menus on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('#more-btn') && !e.target.closest('#more-dropdown')) {
    toggleDropdown(false);
  }
  if (!e.target.closest('#states-btn')) {
    toggleStatesMenu(false);
  }
});

// Mobile sidebar: close on outside click
document.addEventListener('click', (e) => {
  if (window.innerWidth <= 768 && state.sidebarOpen) {
    if (!e.target.closest('#sidebar') && !e.target.closest('#sidebar-toggle-btn')) {
      state.sidebarOpen = false;
      els.sidebar.classList.remove('mobile-open');
    }
  }
});

// ─── INIT ─────────────────────────────────────────────────────
buildStatesMenu();
renderMain(4); // Start at state 4: Home root

// Accessibility: announce state for screen readers
const liveRegion = document.createElement('div');
liveRegion.setAttribute('aria-live', 'polite');
liveRegion.setAttribute('aria-atomic', 'true');
liveRegion.className = 'sr-only';
liveRegion.style.cssText = 'position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;';
document.body.appendChild(liveRegion);
</script>
