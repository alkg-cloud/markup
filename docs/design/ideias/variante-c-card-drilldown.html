<!--
  VARIANTE C — CARD-FIRST DRILLDOWN: SPATIAL GALLERY
  Markup Protótipos v2 — baseado em UX Spec formal MARA-19

  Direção estética: Cards dominam, drill-down progressivo, sem sidebar fixa

  Tipografia:
  - Card de projeto: Manrope 800, 20px, nome do projeto como hero
  - Card de pasta: Manrope 600, 16px
  - Card de mockup: Manrope 500, 14px
  - Meta/badges: Manrope 400, 12px, --text-muted
  - Paths: JetBrains Mono 400, 12px

  Palette:
  - Cards usam --gradient-card-soft e --gradient-card-strong
  - Hover: --shadow-lg + border accent
  - Background: --bg puro — cards se destacam no void

  Motion:
  - Card hover: 160ms ease-standard (shadow + scale 1.01)
  - Drill-down: 220ms fade + translateY(8px→0)
  - Breadcrumb update: 160ms
  - Toast: 150ms in / 250ms out

  Spec: MARA-19 ux-spec (3 níveis max, home root /, finder ≥3 chars,
  logout sem modal, toast undo 5s, Unsorted virtual, drag toast undo)
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARA — Spatial Gallery (Variante C)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ──────────────────────────────────────────────────────────────── */
:root {
  --bg: oklch(11% 0.03 165);
  --bg-elevated: oklch(7% 0.02 165);
  --bg-card: oklch(12% 0.02 165);
  --bg-card-active: oklch(15% 0.025 165);
  --bg-tinted: oklch(9% 0.02 165);
  --btn-bg: rgb(39, 39, 39);
  --btn-bg-hover: rgb(48, 48, 48);
  --btn-bg-active: rgb(56, 56, 56);
  --surface-hover: rgba(255,255,255,0.04);
  --surface-active: rgba(255,255,255,0.07);
  --border-subtle: oklch(17% 0.02 165);
  --border: oklch(21% 0.025 165);
  --border-strong: oklch(28% 0.025 165);
  --text-bright: oklch(97% 0.01 165);
  --text: oklch(82% 0.04 165);
  --text-dim: oklch(60% 0.02 165);
  --text-muted: oklch(47% 0.02 165);
  --accent: oklch(74.4% 0.193 165);
  --accent-bright: oklch(82% 0.18 165);
  --accent-soft: oklch(28% 0.08 165);
  --accent-overlay-soft: oklch(74.4% 0.193 165 / 0.18);
  --accent-overlay-mid: oklch(74.4% 0.193 165 / 0.35);
  --success: oklch(76% 0.16 152);
  --warning: oklch(80% 0.15 80);
  --danger: oklch(70% 0.2 25);
  --danger-soft: oklch(28% 0.09 25);
  --danger-border: oklch(40% 0.1 25);
  --gradient-card-soft: linear-gradient(135.92deg, oklch(20% 0.025 322 / 0.85) 7%, oklch(15% 0.02 322 / 0.85) 98%);
  --gradient-card-strong: linear-gradient(135.92deg, oklch(20% 0.025 322 / 0.95) 7%, oklch(15% 0.02 322 / 0.95) 98%);
  --focus-ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  --shadow-glow: 0 0 0 1px oklch(74.4% 0.193 165 / 0.4), 0 0 24px oklch(74.4% 0.193 165 / 0.18);
  --shadow-popover: 0 14px 32px oklch(0%,0,0/0.6), 0 6px 12px oklch(0%,0,0/0.45), inset 0 1px 0 oklch(100%,0,0/0.06);
  --scrim-strong: oklch(0% 0 0 / 0.65);
  --font-body: "Manrope", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", monospace;
  --ease-standard: cubic-bezier(0.32, 0.72, 0, 1);
  --ease-spring: cubic-bezier(0.5, 1.4, 0.6, 1);
  --ease-exit: cubic-bezier(0.32, 0, 0.67, 0);
  --motion-fast: 160ms;
  --motion-base: 220ms;
  --topbar-height: 60px;
  --sidebar-width: 320px;
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-card: 14px;
  --radius-pill: 9999px;
  --shadow-sm: 0 2px 6px oklch(0%,0,0/0.45);
  --shadow-md: 0 6px 16px oklch(0%,0,0/0.5);
  --shadow-lg: 0 18px 44px oklch(0%,0,0/0.55), 0 8px 16px oklch(0%,0,0/0.4);
}
@media (prefers-reduced-motion: reduce) {
  :root { --motion-fast: 0ms; --motion-base: 0ms; }
}

/* ─── RESET ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }
ul, ol { list-style: none; }
a { color: inherit; text-decoration: none; }

/* ─── TOPBAR ──────────────────────────────────────────────────────────────── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-height);
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  z-index: 100;
  padding: 0 16px;
  gap: 0;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  margin-right: 16px;
}
.topbar-logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: var(--bg);
  letter-spacing: -0.5px;
}
.topbar-logo-name {
  font-size: 15px; font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.3px;
}

.topbar-sep {
  width: 1px; height: 20px;
  background: var(--border);
  margin: 0 12px;
  flex-shrink: 0;
}

/* Breadcrumb */
#breadcrumb {
  display: flex; align-items: center;
  flex: 1; min-width: 0;
  overflow: hidden;
}
#breadcrumb ol {
  display: flex; align-items: center;
  list-style: none;
  flex-wrap: nowrap;
  overflow: hidden;
}
#breadcrumb li {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px;
  white-space: nowrap;
  transition: all var(--motion-fast) var(--ease-standard);
}
#breadcrumb li + li::before {
  content: '/';
  color: var(--text-muted);
  margin: 0 6px;
  font-size: 11px;
}
.breadcrumb-link {
  color: var(--text-dim);
  font-weight: 500;
  padding: 3px 6px;
  border-radius: var(--radius-xs);
  transition: color var(--motion-fast), background var(--motion-fast);
  cursor: pointer;
}
.breadcrumb-link:hover { color: var(--text); background: var(--surface-hover); }
.breadcrumb-link:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--radius-xs); }
.breadcrumb-current {
  color: var(--text-bright);
  font-weight: 600;
  padding: 3px 6px;
}

/* Topbar actions */
.topbar-actions {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0; margin-left: auto;
}

/* Finder toggle button */
.finder-toggle-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px;
  height: 34px;
  background: var(--btn-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  transition: background var(--motion-fast), border-color var(--motion-fast);
  min-width: 160px;
}
.finder-toggle-btn:hover { background: var(--btn-bg-hover); border-color: var(--border-strong); color: var(--text-dim); }
.finder-toggle-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
.finder-kbd {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
}

/* New Mockup btn */
.btn-new {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px;
  height: 34px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  color: var(--bg);
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background var(--motion-fast), transform var(--motion-fast) var(--ease-spring), box-shadow var(--motion-fast);
  white-space: nowrap;
}
.btn-new:hover { background: var(--accent-bright); transform: translateY(-1px); box-shadow: var(--shadow-glow); }
.btn-new:active { transform: translateY(0); }
.btn-new:focus-visible { outline: none; box-shadow: var(--focus-ring); }

/* Avatar + menu */
.avatar-wrap { position: relative; }
.avatar-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px 4px 4px;
  border-radius: var(--radius-pill);
  background: var(--btn-bg);
  border: 1px solid var(--border);
  transition: background var(--motion-fast), border-color var(--motion-fast);
  cursor: pointer;
}
.avatar-btn:hover { background: var(--btn-bg-hover); border-color: var(--border-strong); }
.avatar-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
.avatar-circle {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--accent-soft);
  border: 1px solid var(--accent-overlay-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--accent);
}
.avatar-dots {
  font-size: 14px; color: var(--text-dim);
  letter-spacing: 1px; line-height: 1;
}

/* ─── MENU POPOVER ────────────────────────────────────────────────────────── */
.menu-popover {
  position: absolute;
  top: calc(100% + 8px); right: 0;
  min-width: 200px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-popover);
  padding: 6px;
  z-index: 500;
  display: none;
}
.menu-popover.open {
  display: block;
  animation: popoverIn var(--motion-fast) var(--ease-spring) forwards;
}
@keyframes popoverIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.menu-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text);
  cursor: pointer;
  transition: background var(--motion-fast), color var(--motion-fast);
  width: 100%; text-align: left;
}
.menu-item:hover { background: var(--surface-hover); color: var(--text-bright); }
.menu-item:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--radius-sm); }
.menu-item.danger { color: var(--danger); }
.menu-item.danger:hover { background: var(--danger-soft); }
.menu-sep { height: 1px; background: var(--border-subtle); margin: 4px 0; }

/* ─── MAIN LAYOUT ─────────────────────────────────────────────────────────── */
#app {
  padding-top: var(--topbar-height);
  height: 100vh;
  display: flex; flex-direction: column;
}
#main-scroll {
  flex: 1;
  overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#main-scroll::-webkit-scrollbar { width: 6px; }
#main-scroll::-webkit-scrollbar-track { background: transparent; }
#main-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

#main-content {
  padding: 32px 32px 80px;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

/* ─── SECTION HEADERS ─────────────────────────────────────────────────────── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted);
}
.section-count {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-muted);
}

/* ─── CARD GRID ───────────────────────────────────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 40px;
}
@media (max-width: 768px) {
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  #main-content { padding: 20px 16px 80px; }
  .finder-toggle-btn { min-width: 40px; }
  .finder-toggle-btn span:not(.finder-kbd) { display: none; }
  .topbar-logo-name { display: none; }
}

/* ─── BASE CARD SHARED ────────────────────────────────────────────────────── */
.card-base {
  background: var(--gradient-card-soft);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-card);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  outline: none;
  transition:
    background var(--motion-fast) var(--ease-standard),
    border-color var(--motion-fast) var(--ease-standard),
    box-shadow var(--motion-fast) var(--ease-standard),
    transform var(--motion-fast) var(--ease-standard);
}
.card-base:hover {
  background: var(--gradient-card-strong);
  border-color: var(--accent-overlay-mid);
  box-shadow: var(--shadow-lg);
  transform: scale(1.01) translateY(-2px);
}
.card-base:focus-visible {
  box-shadow: var(--focus-ring), var(--shadow-lg);
  border-color: var(--accent-overlay-mid);
}
.card-base:active { transform: scale(1.005); }

/* ─── PROJECT CARD ────────────────────────────────────────────────────────── */
.card-project {
  height: 200px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
}
.card-project::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 120px 80px at 50% 40%, oklch(74.4% 0.193 165 / 0.06), transparent);
  opacity: 0;
  transition: opacity var(--motion-fast);
  pointer-events: none;
}
.card-project:hover::before { opacity: 1; }

.card-project-icon {
  width: 48px; height: 48px;
  font-size: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md);
  background: var(--bg-card);
  border: 1px solid var(--border);
  position: relative; z-index: 1;
}
.card-project-name {
  font-size: 16px; font-weight: 800;
  color: var(--text-bright);
  letter-spacing: -0.3px;
  position: relative; z-index: 1;
  text-align: center; padding: 0 12px;
}
.card-project-badge {
  font-size: 11px; font-weight: 500;
  color: var(--text-muted);
  position: relative; z-index: 1;
  font-family: var(--font-mono);
}

/* ─── FOLDER CARD ─────────────────────────────────────────────────────────── */
.card-folder {
  height: 140px;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-end;
  padding: 14px;
}
.card-folder-icon {
  position: absolute; top: 14px; left: 14px;
  font-size: 20px;
  color: var(--text-dim);
  opacity: 0.8;
  transition: color var(--motion-fast), opacity var(--motion-fast);
}
.card-folder:hover .card-folder-icon { color: var(--accent); opacity: 1; }
.card-folder-name {
  font-size: 14px; font-weight: 600;
  color: var(--text-bright); letter-spacing: -0.2px;
}
.card-folder-meta {
  font-size: 11px; font-weight: 400;
  color: var(--text-muted);
  margin-top: 3px; font-family: var(--font-mono);
}

/* ─── MOCKUP CARD ─────────────────────────────────────────────────────────── */
.card-mockup {
  height: 160px;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-end;
  padding: 14px;
}
.card-mockup-monogram {
  position: absolute; top: 0; left: 0; right: 0;
  height: 100px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.monogram-inner {
  width: 44px; height: 44px;
  border-radius: var(--radius-md);
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  color: var(--text-dim); letter-spacing: -0.5px;
  transition: border-color var(--motion-fast), color var(--motion-fast);
}
.card-mockup:hover .monogram-inner { border-color: var(--accent-overlay-mid); color: var(--accent); }
.card-mockup-name {
  font-size: 13px; font-weight: 500;
  color: var(--text-bright); letter-spacing: -0.1px;
  position: relative; z-index: 1;
}
.card-mockup-meta {
  font-size: 11px; font-weight: 400;
  color: var(--text-muted); margin-top: 3px;
  font-family: var(--font-mono);
  position: relative; z-index: 1;
}

/* ─── ARCHIVED CARD ───────────────────────────────────────────────────────── */
.card-archived { opacity: 0.6; }
.badge-archived {
  position: absolute; top: 10px; right: 10px;
  font-size: 10px; font-weight: 600;
  color: var(--warning);
  background: oklch(80% 0.15 80 / 0.12);
  border: 1px solid oklch(80% 0.15 80 / 0.3);
  border-radius: var(--radius-pill);
  padding: 2px 7px; letter-spacing: 0.04em;
  z-index: 5;
}

/* ─── DRAG STATE ──────────────────────────────────────────────────────────── */
.card-dragging {
  opacity: 0.35 !important;
  border-style: dashed !important;
  border-color: var(--border-strong) !important;
  transform: none !important;
  pointer-events: none;
}
.card-ghost {
  position: fixed !important;
  pointer-events: none;
  z-index: 1000;
  transform: rotate(2.5deg) scale(1.04) !important;
  box-shadow: var(--shadow-lg) !important;
  opacity: 0.9;
  border-color: var(--accent-overlay-mid) !important;
}
.drop-indicator {
  height: 140px;
  border: 2px dashed var(--accent-overlay-mid);
  border-radius: var(--radius-card);
  background: var(--accent-overlay-soft);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  font-size: 12px; font-family: var(--font-mono);
  animation: dropPulse 1.4s ease-in-out infinite;
}
@keyframes dropPulse {
  0%, 100% { border-color: var(--accent-overlay-mid); background: var(--accent-overlay-soft); }
  50% { border-color: var(--accent); background: oklch(74.4% 0.193 165 / 0.12); }
}

/* ─── EMPTY STATES ────────────────────────────────────────────────────────── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 360px; text-align: center; gap: 12px;
}
.empty-icon {
  width: 72px; height: 72px;
  border-radius: var(--radius-md);
  background: var(--bg-card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 8px;
}
.empty-title {
  font-size: 18px; font-weight: 700;
  color: var(--text-bright); letter-spacing: -0.3px;
}
.empty-sub {
  font-size: 13px; color: var(--text-muted);
  max-width: 280px; line-height: 1.65;
}
.empty-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }

.btn-primary {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px; height: 36px;
  background: var(--accent); border-radius: var(--radius-sm);
  color: var(--bg); font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background var(--motion-fast), transform var(--motion-fast) var(--ease-spring);
}
.btn-primary:hover { background: var(--accent-bright); transform: translateY(-1px); }
.btn-primary:focus-visible { outline: none; box-shadow: var(--focus-ring); }

.btn-secondary {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px; height: 36px;
  background: var(--btn-bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: background var(--motion-fast), border-color var(--motion-fast);
}
.btn-secondary:hover { background: var(--btn-bg-hover); border-color: var(--border-strong); }
.btn-secondary:focus-visible { outline: none; box-shadow: var(--focus-ring); }

/* ─── SKELETON / LOADING ──────────────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg,
    var(--bg-card) 0%,
    var(--bg-card) 30%,
    var(--bg-card-active) 50%,
    var(--bg-card) 70%,
    var(--bg-card) 100%);
  background-size: 300% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
  border-radius: var(--radius-card);
  border: 1px solid var(--border-subtle);
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skeleton-project { height: 200px; }
.skeleton-folder  { height: 140px; }
.skeleton-mockup  { height: 160px; }

/* ─── ERROR STATE ─────────────────────────────────────────────────────────── */
.error-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 360px; text-align: center; gap: 14px;
}
.error-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--danger-soft); border: 1px solid var(--danger-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: var(--danger);
}
.error-title { font-size: 16px; font-weight: 700; color: var(--danger); }
.error-sub { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
.btn-retry {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px; height: 36px;

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
function highlight(text, query) {
  if (!query) return text;
  const i = text.toLowerCase().indexOf(query.toLowerCase());
  if (i < 0) return text;
  return text.slice(0, i)
    + '<mark>' + text.slice(i, i + query.length) + '</mark>'
    + text.slice(i + query.length);
}

function triggerEnter() {
  mainContent.classList.remove('content-enter');
  void mainContent.offsetWidth;
  mainContent.classList.add('content-enter');
}

/* ═══════════════════════════════════════════════════
   BREADCRUMB
═══════════════════════════════════════════════════ */
function renderBreadcrumb(crumbs) {
  // crumbs: [{label, onClick?}] — last entry is current page
  breadcrumbList.innerHTML = crumbs.map((c, i) => {
    const isLast = i === crumbs.length - 1;
    if (isLast) {
      return `<li><span class="breadcrumb-current" aria-current="page">${c.label}</span></li>`;
    }
    return `<li><button class="breadcrumb-link" onclick="${c.onClick}">${c.label}</button></li>`;
  }).join('');
  // Animate
  breadcrumbList.style.animation = 'none';
  void breadcrumbList.offsetWidth;
  breadcrumbList.style.animation = 'breadcrumbEnter 160ms var(--ease-standard) forwards';
}

/* ═══════════════════════════════════════════════════
   CARD RENDERS
═══════════════════════════════════════════════════ */
function dragHandle() {
  return `<div class="drag-handle" role="button" aria-label="Arrastar card" aria-grabbed="false" tabindex="0">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true">
      <circle cx="3" cy="2.5" r="1.1"/><circle cx="7" cy="2.5" r="1.1"/>
      <circle cx="3" cy="7.5" r="1.1"/><circle cx="7" cy="7.5" r="1.1"/>
    </svg>
  </div>`;
}

function ctxMenu(id, type) {
  return `<div class="card-ctx-menu">
    <button class="card-ctx-btn" aria-label="Opções de ${type}" onclick="event.stopPropagation(); MARA.showCtx('${id}','${type}')">···</button>
  </div>`;
}

function projectCard(p) {
  return `
<div class="card-base card-project" role="button" tabindex="0"
     aria-label="Projeto ${p.name}, ${p.totalMockups} mockups"
     onclick="MARA.drillProject('${p.id}')"
     onkeydown="if(event.key==='Enter'||event.key===' '){MARA.drillProject('${p.id}');event.preventDefault();}">
  ${dragHandle()}
  ${ctxMenu(p.id, 'project')}
  <div class="card-project-icon" aria-hidden="true">${p.icon}</div>
  <span class="card-project-name">${p.name}</span>
  <span class="card-project-badge">${p.totalMockups} mockups</span>
</div>`;
}

function folderCard(f, drillFn) {
  return `
<div class="card-base card-folder" role="button" tabindex="0"
     aria-label="Pasta ${f.name}, ${f.items} itens"
     onclick="${drillFn}"
     onkeydown="if(event.key==='Enter'||event.key===' '){${drillFn};event.preventDefault();}">
  ${dragHandle()}
  ${ctxMenu(f.id, 'folder')}
  <div class="card-folder-icon" aria-hidden="true">${ICON_FOLDER}</div>
  <span class="card-folder-name">${f.name}</span>
  <span class="card-folder-meta">${f.items} itens</span>
</div>`;
}

function mockupCard(m, opts) {
  opts = opts || {};
  const archivedClass  = opts.archived  ? ' card-archived'  : '';
  const draggingClass  = opts.dragging  ? ' card-dragging'  : '';
  const ghostClass     = opts.ghost     ? ' card-ghost'     : '';
  const archivedBadge  = opts.archived  ? `<span class="badge-archived" role="img" aria-label="Arquivado">Arquivado</span>` : '';
  const actionsBtns    = opts.archiveActions
    ? `<div class="archive-card-actions">
        <button class="arch-btn arch-restore" onclick="event.stopPropagation();MARA.restoreItem('${m.id}','${m.name}')" aria-label="Restaurar ${m.name}">Restaurar</button>
        <button class="arch-btn arch-delete"  onclick="event.stopPropagation();MARA.confirmDelete('${m.id}','${m.name}')" aria-label="Deletar ${m.name}">Deletar</button>
      </div>` : (opts.archived ? '' : ctxMenu(m.id, 'mockup'));
  const ghostStyle     = opts.ghost ? `style="width:200px;top:230px;left:calc(50% - 100px);"` : '';
  const clickHandler   = (!opts.archived && !opts.dragging)
    ? `onclick="MARA.openMockup('${m.id}','${m.name}')"
       onkeydown="if(event.key==='Enter'||event.key===' '){MARA.openMockup('${m.id}','${m.name}');event.preventDefault();}"` : '';
  const mono = opts.ghost
    ? `style="border-color:var(--accent-overlay-mid);color:var(--accent)"` : '';
  return `
<div class="card-base card-mockup${archivedClass}${draggingClass}${ghostClass}"
     role="${opts.archived ? 'img' : 'button'}"
     tabindex="${opts.archived ? -1 : 0}"
     ${ghostStyle}
     aria-label="${opts.archived ? '[Arquivado] ' : ''}Mockup ${m.name}${m.date ? ', ' + m.date : ''}"
     ${clickHandler}>
  ${(!opts.archived && !opts.dragging && !opts.ghost) ? dragHandle() : ''}
  ${archivedBadge}
  ${actionsBtns}
  <div class="card-mockup-monogram" aria-hidden="true">
    <div class="monogram-inner" ${mono}>${m.initials}</div>
  </div>
  <span class="card-mockup-name">${m.name}</span>
  <span class="card-mockup-meta">${m.date || ''}</span>
</div>`;
}

function grid(inner) {
  return `<div class="card-grid" role="grid">${inner}</div>`;
}

function skeleton(type, n) {
  const cls = { project: 'skeleton-project', folder: 'skeleton-folder', mockup: 'skeleton-mockup' }[type];
  return Array.from({ length: n }, () => `<div class="skeleton ${cls}" aria-hidden="true"></div>`).join('');
}

function dropIndicator() {
  return `<div class="drop-indicator" role="presentation" aria-hidden="true">solte aqui</div>`;
}

function sectionHeader(title, right) {
  return `<div class="section-header">
    <span class="section-title">${title}</span>
    ${right ? `<span class="section-count">${right}</span>` : ''}
  </div>`;
}

function contentSection(inner) {
  return `<div class="content-section" style="margin-bottom:36px">${inner}</div>`;
}

  ${grid(skeleton('mockup', 2))}
`)}`;
}

// State 14 — Archive view
function s14() {

    { label: 'Início', onClick: 'MARA.goHome()' },
    { label: 'Arquivo' }
  ]);
  mainContent.innerHTML = `
<div class="archive-header">
  <span aria-hidden="true" style="font-size:22px">🗃️</span>
  <h1 class="archive-header-title">Arquivo</h1>
  <span class="archive-header-count">${DATA.archived.length} itens</span>
</div>
${contentSection(`
  ${sectionHeader('Mockups arquivados')}

// State 15 — Logout dropdown open
function s15() {

  setTimeout(() => {

/* ═══════════════════════════════════════════════════
   DRILL-DOWN — direct navigation
═══════════════════════════════════════════════════ */
function drillAlternateProject(id) {
  const proj = DATA.projects.find(p => p.id === id);
  if (!proj) return;
  renderBreadcrumb([
    { label: 'Início', onClick: 'MARA.goHome()' },
    { label: proj.name }
  ]);
  const folders  = proj.children.filter(c => c.type === 'folder');
  const mockups  = proj.children.filter(c => c.type === 'mockup');
  mainContent.innerHTML = `
${contentSection(`
  <div class="section-header">
    <span style="display:flex;align-items:center;gap:10px">
      <span style="font-size:24px" aria-hidden="true">${proj.icon}</span>
      <span style="font-size:20px;font-weight:800;color:var(--text-bright);letter-spacing:-0.4px">${proj.name}</span>
    </span>
    <span class="section-count">${proj.totalMockups} mockups</span>
  </div>
`)}
${folders.length ? contentSection(`
  ${sectionHeader('Pastas')}
  ${grid(folders.map(f => folderCard(f, `MARA.drillFolder('${id}','${f.id}')`)).join(''))}
`) : ''}
${mockups.length ? contentSection(`
  ${sectionHeader('Mockups')}
  ${grid(mockups.map(m => mockupCard(m)).join(''))}
`) : ''}
${!folders.length && !mockups.length ? `<div class="empty-state"><div class="empty-icon" aria-hidden="true">🗂️</div><h2 class="empty-title">Projeto vazio</h2><p class="empty-sub">Nenhum conteúdo ainda.</p><div class="empty-actions"><button class="btn-primary" onclick="MARA.showToastMsg('Novo mockup em ${proj.name}')">+ Novo Mockup</button></div></div>` : ''}`;
  triggerEnter();
}

function drillFolderGeneric(projId, folderId) {
  const proj    = DATA.projects.find(p => p.id === projId);
  if (!proj) return;
  const folder  = proj.children.find(c => c.id === folderId);
  if (!folder) return;
  renderBreadcrumb([
    { label: 'Início', onClick: 'MARA.goHome()' },
    { label: proj.name, onClick: `MARA.drillProject('${projId}')` },
    { label: folder.name }
  ]);
  const subs    = folder.children.filter(c => c.type === 'folder');
  const mockups = folder.children.filter(c => c.type === 'mockup');
  mainContent.innerHTML = `
${contentSection(`
  <div class="section-header">
    <span style="display:flex;align-items:center;gap:8px">
      <span style="color:var(--text-dim)">${ICON_FOLDER_SM}</span>
      <span style="font-size:20px;font-weight:700;color:var(--text-bright);letter-spacing:-0.3px">${folder.name}</span>
    </span>
    <span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${proj.name} / ${folder.name}</span>
  </div>
`)}
${subs.length ? contentSection(`
  ${sectionHeader('Subpastas')}
  ${grid(subs.map(f => folderCard(f, `MARA.drillSubFolder('${f.id}')`)).join(''))}
`) : ''}
${mockups.length ? contentSection(`
  ${sectionHeader('Mockups')}
  ${grid(mockups.map(m => mockupCard(m)).join(''))}
`) : ''}
${!subs.length && !mockups.length ? `<div class="empty-state"><div class="empty-icon" aria-hidden="true">📂</div><h2 class="empty-title">Pasta vazia</h2><p class="empty-sub">Nenhum conteúdo ainda.</p><div class="empty-actions"><button class="btn-primary" onclick="MARA.showToastMsg('Novo mockup')">+ Novo Mockup</button></div></div>` : ''}`;
  triggerEnter();
}

function drillSubFolderGeneric(subfolderId) {
  // Find subfolder anywhere in data
  for (const proj of DATA.projects) {
    for (const child of proj.children) {
      if (child.type === 'folder' && child.children) {
        const sub = child.children.find(c => c.id === subfolderId && c.type === 'folder');
        if (sub) {
          renderBreadcrumb([
            { label: 'Início',  onClick: 'MARA.goHome()' },
            { label: proj.name, onClick: `MARA.drillProject('${proj.id}')` },
            { label: child.name, onClick: `MARA.drillFolder('${proj.id}','${child.id}')` },
            { label: sub.name }
          ]);
          mainContent.innerHTML = `
${contentSection(`
  <div class="section-header">
    <span style="display:flex;align-items:center;gap:8px">
      <span style="color:var(--text-dim)">${ICON_FOLDER_SM}</span>
      <span style="font-size:20px;font-weight:700;color:var(--text-bright);letter-spacing:-0.3px">${sub.name}</span>
    </span>
    <span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${proj.name} / ${child.name} / ${sub.name}</span>
  </div>
`)}
${sub.children && sub.children.length ? contentSection(`
  ${sectionHeader('Mockups', sub.children.length + ' itens')}
  ${grid(sub.children.filter(m => m.type === 'mockup').map(m => mockupCard(m)).join(''))}
`) : `<div class="empty-state"><div class="empty-icon" aria-hidden="true">📂</div><h2 class="empty-title">Subpasta vazia</h2><p class="empty-sub">Nenhum mockup ainda.</p></div>`}`;
          triggerEnter();
          return;
        }
      }
    }
  }
}

/* ═══════════════════════════════════════════════════
   FINDER
═══════════════════════════════════════════════════ */
function openFinder(prefill) {
  finderOverlay.classList.add('open');
  finderPanel.classList.add('open');
  finderOverlay.setAttribute('aria-hidden', 'false');
  finderInput.setAttribute('aria-expanded', 'true');
  finderOpen = true;
  if (prefill !== undefined) finderInput.value = prefill;
  setTimeout(() => { finderInput.focus(); finderInput.select(); }, 60);
  doSearch(finderInput.value.trim());
}

function closeFinder() {
  finderOverlay.classList.remove('open');
  finderPanel.classList.remove('open');
  finderOverlay.setAttribute('aria-hidden', 'true');
  finderInput.setAttribute('aria-expanded', 'false');
  finderOpen = false;
}

function doSearch(q) {
  if (q.length < 3) {
    finderResults.innerHTML = `
<div class="finder-empty-msg">
  <div class="finder-empty-title" style="color:var(--text-dim)">
    ${q.length === 0 ? 'Digite algo para buscar' : 'Mínimo 3 caracteres'}
  </div>
  <div class="finder-empty-sub">⌘K para fechar</div>
</div>`;
    return;
  }
  const hits = SEARCH_INDEX.filter(item =>
    item.name.toLowerCase().includes(q.toLowerCase())
  );
  if (!hits.length) {
    finderResults.innerHTML = `
<div class="finder-empty-msg">
  <div class="finder-empty-title">Sem resultados para "${q}"</div>
  <div class="finder-empty-sub">Tente outra busca · fuzzy off · ${q.length} chars</div>
</div>`;
    return;
  }
  const typeLabel = { project: 'Projeto', folder: 'Pasta', mockup: 'Mockup' };
  finderResults.innerHTML = hits.map(r => {
    const iconHtml = r.type === 'mockup'
      ? `<span class="finder-result-icon-mono">${r.icon}</span>`
      : r.icon;
    return `
<div class="finder-result-item" role="option" tabindex="0"
     onclick="closeFinder(); MARA.showToastMsg('Abrir: ${r.name}')"
     onkeydown="if(event.key==='Enter'){closeFinder(); MARA.showToastMsg('Abrir: ${r.name}');}">
  <div class="finder-result-icon" aria-hidden="true">${iconHtml}</div>
  <div class="finder-result-info">
    <div class="finder-result-name">${highlight(r.name, q)}</div>
    <div class="finder-result-path">${r.path}</div>
  </div>
  <span class="finder-result-type">${typeLabel[r.type] || r.type}</span>
</div>`;
  }).join('');
}

finderInput.addEventListener('input', () => {
  clearTimeout(finderTimer);
  finderTimer = setTimeout(() => doSearch(finderInput.value.trim()), 300);
});

finderToggleBtn.addEventListener('click', () => openFinder(undefined));
finderOverlay.addEventListener('click', closeFinder);

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    finderOpen ? closeFinder() : openFinder(undefined);
    return;
  }
  if (e.key === 'Escape') {
    if (finderOpen) { closeFinder(); return; }
    if (avatarMenu.classList.contains('open')) { closeAvatarMenu(); return; }
    if (stateMenu.classList.contains('open')) { closeStateMenu(); return; }
    if (modalOverlay.classList.contains('open')) { closeModal(); return; }
  }
});

/* ═══════════════════════════════════════════════════
   AVATAR MENU
═══════════════════════════════════════════════════ */
function closeAvatarMenu() {
  avatarMenu.classList.remove('open');
  avatarBtn.setAttribute('aria-expanded', 'false');
}

avatarBtn.addEventListener('click', e => {
  e.stopPropagation();
  const isOpen = avatarMenu.classList.contains('open');
  closeAvatarMenu();
  if (!isOpen) {
    avatarMenu.classList.add('open');
    avatarBtn.setAttribute('aria-expanded', 'true');
  }
});

btnLogout.addEventListener('click', () => {
  closeAvatarMenu();
  showToast('Saindo da conta…', null, 1400);
  setTimeout(() => { window.location.href = '/login'; }, 1600);
});

document.addEventListener('click', e => {
  if (!document.getElementById('avatar-wrap').contains(e.target)) closeAvatarMenu();
  if (!stateSwitcher.contains(e.target)) closeStateMenu();
});

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
function openModal(title, body, onConfirm, confirmLabel) {
  modalTitle.textContent = title;
  modalBody.innerHTML = body;
  modalConfirm.textContent = confirmLabel || 'Confirmar';
  modalOverlay.classList.add('open');
  modalConfirm.onclick = () => { closeModal(); if (onConfirm) onConfirm(); };
}
function closeModal() { modalOverlay.classList.remove('open'); }
modalCancel.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

/* ═══════════════════════════════════════════════════
   TOASTS
═══════════════════════════════════════════════════ */
function showToast(message, onUndo, duration) {
  duration = duration === undefined ? 5000 : duration;
  const el = document.createElement('div');
  el.className = 'toast';
  el.setAttribute('role', 'status');
  el.innerHTML = message;
  if (onUndo) {
    const undoEl = document.createElement('span');
    undoEl.className = 'toast-undo';
    undoEl.textContent = 'Desfazer';
    undoEl.setAttribute('tabindex', '0');
    undoEl.setAttribute('role', 'button');
    undoEl.setAttribute('aria-label', 'Desfazer ação');
    undoEl.addEventListener('click', () => { hide(); onUndo(); });
    undoEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { hide(); onUndo(); } });
    el.appendChild(undoEl);
  }
  toastContainer.appendChild(el);
  function hide() {
    el.classList.add('hiding');
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 260);
  }
  const t = setTimeout(hide, duration);
  el.addEventListener('click', e => {
    if (!e.target.classList.contains('toast-undo')) { clearTimeout(t); hide(); }
  });
  return hide;
}

/* ═══════════════════════════════════════════════════
   STATE SWITCHER
═══════════════════════════════════════════════════ */
function closeStateMenu() {
  stateMenu.classList.remove('open');
  stateBtn.setAttribute('aria-expanded', 'false');
}

function renderStateMenu() {
  stateMenu.innerHTML = STATES.map(s => `
<button class="state-menu-item${s.id === currentState ? ' active' : ''}"
        role="menuitem"
        onclick="MARA.setState(${s.id})"
        aria-current="${s.id === currentState}">
  <span class="state-num">${String(s.id).padStart(2, '0')}</span>
  ${s.label}
</button>`).join('');
}

stateBtn.addEventListener('click', e => {
  e.stopPropagation();
  const isOpen = stateMenu.classList.contains('open');
  closeStateMenu();
  if (!isOpen) {
    renderStateMenu();
    stateMenu.classList.add('open');
    stateBtn.setAttribute('aria-expanded', 'true');
  }
});

/* ═══════════════════════════════════════════════════
   PUBLIC API
═══════════════════════════════════════════════════ */
window.MARA = {
  setState(n) {
    if (finderOpen) closeFinder();
    closeAvatarMenu();
    closeStateMenu();
    currentState = n;
    stateBtn.textContent = `[ Estado ${n} ▾ ]`;
    const map = { 1:s1,2:s2,3:s3,4:s4,5:s5,6:s6,7:s7,8:s8,9:s9,10:s10,11:s11,12:s12,13:s13,14:s14,15:s15 };
    if (map[n]) map[n]();
  },
  goHome()      { this.setState(1); },
  drillProject(id) {
    closeStateMenu();
    if (id === 'alpha') this.setState(4);
    else if (id === 'beta') drillAlternateProject(id);
    else drillAlternateProject(id);
  },
  drillFolder(projId, folderId) {
    closeStateMenu();
    if (projId === 'alpha' && folderId === 'alpha-landing')  { this.setState(5); return; }
    drillFolderGeneric(projId, folderId);
  },
  drillSubFolder(subfolderId) {
    closeStateMenu();
    if (subfolderId === 'alpha-landing-hero') { this.setState(6); return; }
    drillSubFolderGeneric(subfolderId);
  },
  openMockup(id, name) {
    showToast(`Abrindo "${name || id}" no viewer…`, null, 2000);
  },
  restoreItem(id, name) {
    showToast(`"${name}" restaurado com sucesso`, null, 3000);
  },
  confirmDelete(id, name) {
    openModal(
      'Deletar permanentemente?',
      `O mockup <strong>"${name}"</strong> será excluído e não poderá ser recuperado.`,
      () => showToast(`"${name}" deletado permanentemente`, null, 3000),
      'Deletar'
    );
  },
  showCtx(id, type) {
    showToast(`Opções: ${type} "${id}" (menu contextual simulado)`, null, 2000);
  },
  showToastMsg(msg) { showToast(msg, null, 2500); },
  retryLoad() {
    s12();
    showToast('Reconectando…', null, 1500);
    setTimeout(() => { this.setState(1); showToast('Dados carregados!', null, 2000); }, 2000);
  }
};

// Expose helpers for inline HTML
window.closeAvatarMenu = closeAvatarMenu;
window.closeFinder = closeFinder;
window.showToast = showToast;

/* ═══════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════ */
MARA.setState(1);

})();
</script>
