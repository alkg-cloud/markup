<!DOCTYPE html>
<!--
  VARIANTE B — MILLER COLUMNS: EDITORIAL CASCADE
  Markup Protótipos v2 — baseado em UX Spec formal MARA-19

  Direção estética: Colunas progressivas horizontais — limpo, espacioso, arquitetônico

  Tipografia:
  - Headers de coluna: Manrope 600, 12px, uppercase, tracking 0.12em
  - Lista items: Manrope 400/500, 14px
  - Paths: JetBrains Mono 400, 12px, --text-muted

  Palette: tokens do design sistema apenas. Colunas separadas por --border-subtle 1px.
  Item ativo: border-left 2px --accent + --surface-active background.

  Motion:
  - Coluna nova desliza da direita: 220ms ease-standard translateX
  - Coluna removida fade-out: 160ms ease-exit
  - Item hover: 90ms instant
  - Toast: 150ms in / 250ms out

  Spec: MARA-19 ux-spec (3 níveis max, home root /, finder ≥3 chars,
  logout sem modal, toast undo 5s, Unsorted virtual project)
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARA — Miller Columns · Variante B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─────────────────────────────────────────────────────────── */
:root {
  --bg: oklch(11% 0.03 165);
  --bg-elevated: oklch(7% 0.02 165);
  --bg-card: oklch(12% 0.02 165);
  --bg-card-active: oklch(15% 0.025 165);
  --bg-tinted: oklch(9% 0.02 165);
  --btn-bg: rgb(39, 39, 39);
  --btn-bg-hover: rgb(48, 48, 48);
  --btn-bg-active: rgb(56, 56, 56);
  --surface-hover: rgba(255,255,255,0.04);
  --surface-active: rgba(255,255,255,0.07);
  --border-subtle: oklch(17% 0.02 165);
  --border: oklch(21% 0.025 165);
  --border-strong: oklch(28% 0.025 165);
  --text-bright: oklch(97% 0.01 165);
  --text: oklch(82% 0.04 165);
  --text-dim: oklch(60% 0.02 165);
  --text-muted: oklch(47% 0.02 165);
  --accent: oklch(74.4% 0.193 165);
  --accent-bright: oklch(82% 0.18 165);
  --accent-soft: oklch(28% 0.08 165);
  --accent-overlay-soft: oklch(74.4% 0.193 165 / 0.18);
  --accent-overlay-mid: oklch(74.4% 0.193 165 / 0.35);
  --success: oklch(76% 0.16 152);
  --warning: oklch(80% 0.15 80);
  --danger: oklch(70% 0.2 25);
  --danger-soft: oklch(28% 0.09 25);
  --danger-border: oklch(40% 0.1 25);
  --focus-ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  --shadow-glow: 0 0 0 1px oklch(74.4% 0.193 165 / 0.4), 0 0 24px oklch(74.4% 0.193 165 / 0.18);
  --shadow-popover: 0 14px 32px oklch(0%,0,0/0.6), 0 6px 12px oklch(0%,0,0/0.45), inset 0 1px 0 oklch(100%,0,0/0.06);
  --scrim-strong: oklch(0% 0 0 / 0.65);
  --font-body: "Manrope", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", monospace;
  --ease-standard: cubic-bezier(0.32, 0.72, 0, 1);
  --ease-spring: cubic-bezier(0.5, 1.4, 0.6, 1);
  --ease-exit: cubic-bezier(0.32, 0, 0.67, 0);
  --motion-fast: 160ms;
  --motion-base: 220ms;
  --topbar-height: 60px;
  --sidebar-width: 320px;
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-card: 14px;
  --radius-pill: 9999px;
  --shadow-sm: 0 2px 6px oklch(0%,0,0/0.45);
  --shadow-md: 0 6px 16px oklch(0%,0,0/0.5);
}
@media (prefers-reduced-motion: reduce) {
  :root { --motion-fast: 0ms; --motion-base: 0ms; }
}

/* ─── RESET ──────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }
ul, ol { list-style: none; }
a { color: inherit; text-decoration: none; }

/* Focus ring — global */
*:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: var(--radius-xs);
}

/* ─── TOPBAR ─────────────────────────────────────────────────────────────────── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-height);
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  z-index: 100;
  flex-shrink: 0;
}

/* Logo */
.tb-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  text-decoration: none;
}
.tb-logo-mark {
  width: 28px; height: 28px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-overlay-mid);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.tb-logo-text {
  font-size: 15px; font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.04em;
}

.tb-spacer { flex: 1; }

/* Finder field */
.finder-wrap { position: relative; flex-shrink: 0; }
#finder-input {
  height: 34px;
  width: 210px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 0 38px 0 14px;
  font-size: 13px;
  color: var(--text);
  transition: border-color var(--motion-fast), width var(--motion-base) var(--ease-standard), box-shadow var(--motion-fast);
}
#finder-input::placeholder { color: var(--text-muted); }
#finder-input:focus {
  border-color: var(--border-strong);
  box-shadow: var(--focus-ring);
  width: 270px;
  outline: none;
}
.finder-kbd {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 10px; color: var(--text-muted);
  background: var(--btn-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  padding: 1px 5px;
  pointer-events: none;
  transition: opacity var(--motion-fast);
}
#finder-input:focus + .finder-kbd { opacity: 0; }

/* Finder dropdown */
#finder-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 340px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-popover);
  overflow: hidden;
  z-index: 200;
  animation: anim-drop-in var(--motion-fast) var(--ease-standard);
}
#finder-dropdown.visible { display: block; }
@keyframes anim-drop-in {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fd-section-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted);
  padding: 10px 14px 4px;
}
.fd-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  cursor: pointer;
  transition: background var(--motion-fast);
}
.fd-item:hover { background: var(--surface-hover); }
.fd-item-icon { font-size: 14px; flex-shrink: 0; }
.fd-item-body { flex: 1; min-width: 0; }
.fd-item-name { font-size: 13px; color: var(--text-bright); }
.fd-item-name mark {
  background: var(--accent-overlay-soft);
  color: var(--accent);
  border-radius: 2px; padding: 0 1px;
}
.fd-item-path {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-muted);
  margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fd-divider { height: 1px; background: var(--border-subtle); margin: 4px 0; }
.fd-empty {
  padding: 24px 14px;
  text-align: center;
}
.fd-empty-title { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 4px; }
.fd-empty-sub { font-size: 12px; color: var(--text-muted); }

/* New Mockup button */
.btn-new-mockup {
  height: 34px; padding: 0 14px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-overlay-mid);
  border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
  transition: background var(--motion-fast), border-color var(--motion-fast);
}
.btn-new-mockup:hover { background: var(--accent-overlay-mid); border-color: var(--accent); }
.btn-new-mockup:active { background: var(--accent); color: var(--bg); }

/* Avatar + ··· */
.tb-user-wrap { position: relative; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.tb-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent-soft);
  border: 1.5px solid var(--accent-overlay-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--accent);
  cursor: default;
}
#btn-more {
  width: 30px; height: 30px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: 0.05em;
  transition: background var(--motion-fast), color var(--motion-fast);
}
#btn-more:hover { background: var(--surface-hover); color: var(--text); }
#btn-more.open { background: var(--surface-active); color: var(--text-bright); }

/* Dropdown menu */
.dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  min-width: 204px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-popover);
  padding: 5px;
  z-index: 300;
  animation: anim-drop-in var(--motion-fast) var(--ease-standard);
}
.dropdown.open { display: block; }
.dd-user {
  padding: 8px 10px 10px;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 4px;
}
.dd-user-name { font-size: 13px; font-weight: 600; color: var(--text-bright); }
.dd-user-email { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.dd-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text);
  cursor: pointer;
  transition: background var(--motion-fast), color var(--motion-fast);
  width: 100%; text-align: left;
}
.dd-item:hover { background: var(--surface-hover); color: var(--text-bright); }
.dd-item.danger { color: var(--danger); }
.dd-item.danger:hover { background: var(--danger-soft); }
.dd-divider { height: 1px; background: var(--border-subtle); margin: 4px 0; }

/* ─── APP SHELL ──────────────────────────────────────────────────────────────── */
#app {
  position: fixed;
  top: var(--topbar-height);
  left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ─── MILLER CONTAINER ───────────────────────────────────────────────────────── */
#miller-wrap {
  flex: 1;
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#miller-wrap::-webkit-scrollbar { height: 5px; }
#miller-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── COLUMN BASE ────────────────────────────────────────────────────────────── */
.mc {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border-subtle);
  overflow: hidden;
  animation: anim-col-in var(--motion-base) var(--ease-standard);
}
@keyframes anim-col-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.mc.col-exit {
  animation: anim-col-out var(--motion-fast) var(--ease-exit) forwards;
  pointer-events: none;
}
@keyframes anim-col-out {
  from { opacity: 1; }
  to   { opacity: 0; }
}

/* Column widths */
.mc-0 { width: 240px; }
.mc-1 { width: 260px; }
.mc-2 { width: 260px; }
.mc-preview { flex: 1; min-width: 380px; }
.mc-welcome { flex: 1; min-width: 320px; }

/* Column header */
.mc-head {
  flex-shrink: 0;
  height: 44px;
  padding: 0 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
  gap: 8px;
}
.mc-head-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-muted);
}
.mc-head-title {
  font-size: 13px; font-weight: 600;
  color: var(--text-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
.mc-head-count {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-muted);
  flex-shrink: 0;
}

/* Column scrollable body */
.mc-body {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-subtle) transparent;
}
.mc-body::-webkit-scrollbar { width: 3px; }
.mc-body::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }

/* Section label inside column */
.mc-section {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted);
  padding: 10px 16px 4px;
}
.mc-divider { height: 1px; background: var(--border-subtle); margin: 4px 0; }

/* Column list */
.mc-list { padding: 5px 0; }

/* List item */
.mc-item {
  position: relative;
  display: flex; align-items: center; gap: 9px;
  padding: 7px 14px 7px 16px;
  border-left: 2px solid transparent;
  cursor: pointer;
  user-select: none;
  transition: background 90ms, border-color 90ms;
}
.mc-item:hover { background: var(--surface-hover); }
.mc-item.selected {
  background: var(--surface-active);
  border-left-color: var(--accent);
}
.mc-item.selected .mc-item-name { color: var(--text-bright); font-weight: 500; }
.mc-item.selected .mc-chevron { color: var(--accent); }
.mc-item.archived { opacity: 0.58; }
.mc-item.dragging { opacity: 0.35; }
.mc-item-icon { font-size: 14px; flex-shrink: 0; }
.mc-item-body { flex: 1; min-width: 0; }
.mc-item-name {
  font-size: 13.5px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 90ms;
}
.mc-item-meta {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-muted);
  margin-top: 1px;
}
.mc-chevron { font-size: 10px; color: var(--text-muted); flex-shrink: 0; transition: color 90ms; }

/* Badges */
.badge {
  font-size: 10px; font-weight: 600;
  padding: 2px 6px;
  border-radius: var(--radius-pill);
  flex-shrink: 0;
  white-space: nowrap;
}
.badge-warn {
  background: oklch(80% 0.15 80 / 0.14);
  color: var(--warning);
  border: 1px solid oklch(80% 0.15 80 / 0.28);
}
.badge-accent {
  background: var(--accent-overlay-soft);
  color: var(--accent);
  border: 1px solid var(--accent-overlay-mid);
}

/* New project footer row */
.mc-new-row {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  font-size: 13px; color: var(--text-muted);
  cursor: pointer;
  border-top: 1px solid var(--border-subtle);
  transition: background var(--motion-fast), color var(--motion-fast);
}
.mc-new-row:hover { background: var(--surface-hover); color: var(--text); }
.mc-new-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--accent);
  padding: 1px 0;
  font-size: 13px; color: var(--text-bright);
  outline: none;
}

/* Rename input */
.rename-input {
  background: var(--bg-tinted);
  border: 1px solid var(--accent);
  border-radius: var(--radius-xs);
  padding: 1px 6px;
  font-size: 13.5px; color: var(--text-bright);
  width: 100%; outline: none;
  box-shadow: var(--focus-ring);
}

/* Drop indicator */
.drop-line {
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
  margin: 1px 14px;
  box-shadow: var(--shadow-glow);
}

/* ─── WELCOME PANEL ──────────────────────────────────────────────────────────── */
.welcome-body { padding: 28px 28px 28px; overflow-y: auto; height: 100%; }
.welcome-h1 {
  font-size: 21px; font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.03em;
  margin-bottom: 4px;
}
.welcome-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
.welcome-sec-title {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.recent-list { display: flex; flex-direction: column; gap: 1px; margin-bottom: 28px; }
.recent-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--motion-fast);
}
.recent-item:hover { background: var(--surface-hover); }
.recent-thumb {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.recent-info { flex: 1; min-width: 0; }
.recent-name { font-size: 13px; font-weight: 500; color: var(--text-bright); }
.recent-path { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.recent-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.unsorted-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  overflow: hidden;
}
.unsorted-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  transition: background var(--motion-fast);
  cursor: pointer;
}
.unsorted-row:hover { background: var(--surface-hover); }
.unsorted-row + .unsorted-row { border-top: 1px solid var(--border-subtle); }
.unsorted-icon { font-size: 13px; }
.unsorted-name { font-size: 13px; color: var(--text); flex: 1; }
.unsorted-time { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

/* ─── PREVIEW PANEL ──────────────────────────────────────────────────────────── */
.prev-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.prev-breadcrumb {
  flex-shrink: 0;
  height: 44px;
  padding: 0 20px;
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border-subtle);
}
.bc-list { display: flex; align-items: center; gap: 0; }
.bc-item {
  display: flex; align-items: center; gap: 4px;
  font-family: var(--font-mono);
  font-size: 12px; color: var(--text-muted);
}
.bc-item a { transition: color var(--motion-fast); }
.bc-item a:hover { color: var(--text); }
.bc-item[aria-current="page"] { color: var(--text-dim); }
.bc-sep { color: var(--border-strong); font-size: 11px; margin: 0 2px; }
.prev-content { flex: 1; overflow-y: auto; padding: 24px; }
.prev-title {
  font-size: 19px; font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.03em;
  margin-bottom: 5px;
}
.prev-meta {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-muted);
  margin-bottom: 18px;
  display: flex; gap: 16px; flex-wrap: wrap;
}
.prev-frame {
  width: 100%; aspect-ratio: 16/10;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; margin-bottom: 16px;
}
.prev-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  color: var(--text-muted);
}
.prev-placeholder-icon { font-size: 38px; opacity: 0.3; }
.prev-placeholder-text { font-size: 13px; }
.prev-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
}
.prev-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--motion-fast), transform var(--motion-fast), box-shadow var(--motion-fast);
}
.prev-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.prev-card-thumb {
  width: 100%; aspect-ratio: 4/3;
  background: var(--bg-tinted);

.skel {

/* ── HELPERS ────────────────────────────────────────────────────────────────── */
function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'cls') el.className = v;
    else if (k === 'text') el.textContent = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  }
  return el;
}

function findItem(id) {
  function search(items) {
    for (const it of items) {
      if (it.id === id) return it;
      if (it.children) { const r = search(it.children); if (r) return r; }
    }
    return null;
  }
  for (const p of DB.projects) {
    if (p.id === id) return p;
    const r = search(p.children || []);
    if (r) return r;
  }
  return null;
}

function pathTo(id) {
  function walk(items, trail) {
    for (const it of items) {
      const next = [...trail, it.name];
      if (it.id === id) return next;
      if (it.children) { const r = walk(it.children, next); if (r) return r; }
    }
    return null;
  }
  for (const p of DB.projects) {
    if (p.id === id) return [p.name];
    const r = walk(p.children || [], [p.name]);
    if (r) return r;
  }
  return [id];
}

function makeSkeletonRows(n) {
  return Array.from({ length: n }, (_, i) =>
    `<div class="skel-row">
      <div class="skel skel-icon"></div>
      <div class="skel-lines">
        <div class="skel skel-line" style="width:${58 + (i % 3) * 12}%"></div>
        <div class="skel skel-line" style="width:${28 + (i % 2) * 18}%"></div>
      </div>
    </div>`
  ).join('');
}

/* Column 3: preview / subfolder contents */
function colPreview(opts = {}) {
  const { subfolderId = null, mockupId = null, breadcrumb = [], emptyMsg = null } = opts;
  const col = document.createElement('div');
  col.className = 'mc mc-preview';
  col.setAttribute('role', 'region');
  col.setAttribute('aria-label', 'Painel de preview');
  col.dataset.mcIndex = 'preview';

  // Breadcrumb HTML
  const bcHtml = breadcrumb.length
    ? `<nav class="prev-breadcrumb" aria-label="Localização atual">
        <ol class="bc-list" role="list">
          ${breadcrumb.map((seg, i) => {
            const last = i === breadcrumb.length - 1;
            return `<li class="bc-item"${last ? ' aria-current="page"' : ''}>
              ${i > 0 ? `<span class="bc-sep" aria-hidden="true">/</span>` : ''}
              ${last ? `<span>${seg}</span>` : `<a href="#">${seg}</a>`}
            </li>`;
          }).join('')}
        </ol>
      </nav>`
    : `<div class="prev-breadcrumb" aria-hidden="true"></div>`;

  let contentHtml = '';

  if (emptyMsg) {
    contentHtml = `
      <div class="empty" style="margin-top:60px">
        <div class="empty-icon">📂</div>
        <div class="empty-title">${emptyMsg}</div>
      </div>`;
  } else if (mockupId) {
    const m = findItem(mockupId);
    if (m) {
      contentHtml = `
        <div class="prev-title">${m.name}</div>
        <div class="prev-meta">
          <span>${m.updatedAt}</span>
          <span>por ${m.author}</span>
        </div>
        <div class="prev-frame">
          <div class="prev-placeholder">
            <div class="prev-placeholder-icon" aria-hidden="true">${m.icon}</div>
            <div class="prev-placeholder-text">Preview · ${m.name}</div>
          </div>
        </div>
        <div class="prev-actions">
          <button class="prev-action-btn" onclick="openModal('${m.name}')">📦 Arquivar</button>
          <button class="prev-action-btn" onclick="toast('✏️','Editar ${m.name} — em breve!')">✏️ Editar</button>
          <button class="prev-action-btn" onclick="toast('🔗','Link copiado!')">🔗 Copiar link</button>
        </div>`;
    }
  } else if (subfolderId) {
    const sf = findItem(subfolderId);
    if (sf) {
      const mockups = (sf.children || []).filter(c => c.type === 'mockup' || !c.type);
      if (mockups.length) {
        contentHtml = `
          <div class="prev-title">${sf.name}</div>
          <div class="prev-meta"><span>${mockups.length} mockup${mockups.length > 1 ? 's' : ''}</span></div>
          <div class="prev-grid">
            ${mockups.map(m => `
              <div class="prev-card" role="button" tabindex="0" aria-label="Abrir ${m.name}" onclick="toast('🖼️','Abrindo ${m.name}…')">
                <div class="prev-card-thumb" aria-hidden="true">${m.icon}</div>
                <div class="prev-card-info">
                  <div class="prev-card-name">${m.name}</div>
                  <div class="prev-card-meta">${m.updatedAt}</div>
                  ${m.archived ? `<span class="badge badge-warn" style="display:inline-block;margin-top:4px">Arquivado</span>` : ''}
                </div>
              </div>`).join('')}
          </div>`;
      } else {
        contentHtml = `
          <div class="empty" style="margin-top:60px">
            <div class="empty-icon">📂</div>
            <div class="empty-title">Subpasta vazia</div>
          </div>`;
      }
    }
  }

  col.innerHTML = bcHtml + `<div class="prev-content">${contentHtml}</div>`;
  return col;
}

/* ── RENDER STATES ──────────────────────────────────────────────────────────── */
function clearMiller() {
  millerWrap.innerHTML = '';
  archiveView.classList.remove('on');
  millerWrap.style.display = 'flex';
  dragGhost.style.display = 'none';
  closeUserMenu();
  resetFinder();
}

function render(n) {
  currentState = n;
  clearMiller();
  switch (n) {
    case  1: renderHome();               break;
    case  2: renderFinderResults();      break;
    case  3: renderFinderNoResults();    break;
    case  4: renderProjectSelected();    break;
    case  5: renderFolderSelected();     break;
    case  6: renderSubfolderSelected();  break;
    case  7: renderDragInProgress();     break;
    case  8: renderArchivedMockup();     break;
    case  9: renderNoProjects();         break;
    case 10: renderEmptyProject();       break;
    case 11: renderEmptyFolder();        break;
    case 12: renderLoading();            break;
    case 13: renderError();              break;
    case 14: renderArchiveView();        break;
    case 15: renderLogoutDropdown();     break;
  }
  updateStatePanel();
  // Scroll right after render
  requestAnimationFrame(() => {
    millerWrap.scrollTo({ left: millerWrap.scrollWidth, behavior: 'smooth' });
  });
}

function renderHome() {
  millerWrap.appendChild(col0());
  millerWrap.appendChild(colWelcome());
}

function renderFinderResults() {
  renderHome();
  finderInput.value = 'hero';
  showFinderDropdown('hero');
}

/* ── RENAME ─────────────────────────────────────────────────────────────────── */
function startRename(row) {
  const nameEl = row.querySelector('.mc-item-name');
  if (!nameEl) return;
  const orig = nameEl.textContent;
  const inp = document.createElement('input');
  inp.className = 'rename-input';
  inp.value = orig;
  nameEl.replaceWith(inp);
  inp.focus(); inp.select();

  function commit() {
    const newVal = inp.value.trim() || orig;
    const span = document.createElement('div');
    span.className = 'mc-item-name';
    span.textContent = newVal;
    inp.replaceWith(span);
    if (newVal !== orig) toast('✏️', `Renomeado para "${newVal}"`);
  }

  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') commit();
    if (e.key === 'Escape') {
      const span = document.createElement('div');
      span.className = 'mc-item-name';
      span.textContent = orig;
      inp.replaceWith(span);
    }
    e.stopPropagation();
  });
}

  const row = document.getElementById('new-proj-row');

/* ── FINDER ─────────────────────────────────────────────────────────────────── */
let finderTimer;
function onFinderInput(e) {
  const q = e.target.value.trim();
  clearTimeout(finderTimer);
  if (q.length < 3) {
    finderDD.innerHTML = '';
    finderDD.classList.remove('visible');
    finderInput.setAttribute('aria-expanded', 'false');
    return;
  }
  finderTimer = setTimeout(() => showFinderDropdown(q), 300);
}

function fuzzy(str, q) {
  return str.toLowerCase().includes(q.toLowerCase());
}

function hl(text, q) {
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return text;
  return `${text.slice(0, i)}<mark>${text.slice(i, i + q.length)}</mark>${text.slice(i + q.length)}`;
}

function showFinderDropdown(q) {
  const results = { projects: [], folders: [], mockups: [] };

  function crawl(items, trail, pName) {
    for (const it of items) {
      if (fuzzy(it.name, q)) {
        const group = it.type === 'mockup' ? 'mockups'
          : (it.type === 'folder' || it.type === 'subfolder') ? 'folders'
          : 'projects';
        results[group].push({ ...it, pathStr: trail.join(' / '), projectName: pName });
      }
      if (it.children) crawl(it.children, [...trail, it.name], pName);
    }
  }

  for (const p of DB.projects) {
    if (fuzzy(p.name, q)) results.projects.push({ ...p, pathStr: '/', projectName: p.name });
    crawl(p.children || [], [p.name], p.name);
  }

  const total = results.projects.length + results.folders.length + results.mockups.length;

  if (total === 0) {
    finderDD.innerHTML = `
      <div class="fd-empty">
        <div class="fd-empty-title">Nenhum resultado para "${q}"</div>
        <div class="fd-empty-sub" style="font-size:12px;color:var(--text-muted);margin-top:3px">Tente termos diferentes</div>
      </div>`;
  } else {
    let html = '';
    const sections = [
      { key: 'projects', label: 'Projetos' },
      { key: 'folders',  label: 'Pastas' },
      { key: 'mockups',  label: 'Mockups' }
    ];
    let first = true;
    for (const s of sections) {
      if (!results[s.key].length) continue;
      if (!first) html += `<div class="fd-divider" aria-hidden="true"></div>`;
      first = false;
      html += `<div class="fd-section-label">${s.label}</div>`;
      for (const it of results[s.key]) {
        html += `
          <div class="fd-item" role="option" tabindex="0" onclick="toast('🔍','Abrindo ${it.name}…')">
            <span class="fd-item-icon" aria-hidden="true">${it.icon}</span>
            <div class="fd-item-body">
              <div class="fd-item-name">${hl(it.name, q)}</div>
              <div class="fd-item-path">${it.pathStr}</div>
            </div>
          </div>`;
      }
    }
    finderDD.innerHTML = html;
  }

  finderDD.classList.add('visible');
  finderInput.setAttribute('aria-expanded', 'true');
}

function resetFinder() {
  finderInput.value = '';
  finderDD.innerHTML = '';
  finderDD.classList.remove('visible');
  finderInput.setAttribute('aria-expanded', 'false');
}

/* ── TOAST ──────────────────────────────────────────────────────────────────── */
function toast(icon, msg, withUndo = false, undoCb = null) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.setAttribute('role', 'status');
  el.innerHTML = `
    <span class="toast-icon" aria-hidden="true">${icon}</span>
    <span>${msg}</span>
    ${withUndo ? `<button class="toast-undo">Desfazer</button>` : ''}`;

  if (withUndo && undoCb) {
    el.querySelector('.toast-undo').addEventListener('click', () => { dismiss(); undoCb(); });
  }

  toastDock.appendChild(el);
  const timer = setTimeout(dismiss, 5000);

  function dismiss() {
    clearTimeout(timer);
    el.classList.add('leaving');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }
}

/* ── GLOBAL KEYBOARD ────────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  // ⌘K / Ctrl+K → finder focus
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    finderInput.focus();
    finderInput.select();
    return;
  }

  // Escape — close overlays in priority order
  if (e.key === 'Escape') {
    if (modalScrim.classList.contains('on'))      { closeModal(); return; }
    if (finderDD.classList.contains('visible'))   { resetFinder(); finderInput.blur(); return; }
    if (userMenu.classList.contains('open'))      { closeUserMenu(); return; }
    if (statePanel.classList.contains('open'))    { statePanel.classList.remove('open'); stateToggle.setAttribute('aria-expanded','false'); return; }
    return;
  }

  // Arrow navigation within columns
  const focused = document.activeElement;
  const mcItem = focused?.closest?.('.mc-item');
  if (!mcItem) return;

  const colEl  = mcItem.closest('.mc');
  const items  = Array.from(colEl.querySelectorAll('.mc-item'));
  const idx    = items.indexOf(mcItem);

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    items[Math.min(idx + 1, items.length - 1)]?.focus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    items[Math.max(idx - 1, 0)]?.focus();
  } else if (e.key === 'ArrowRight' || e.key === 'Enter') {
    if (mcItem.querySelector('.mc-chevron')) {
      e.preventDefault();
      mcItem.click();
      setTimeout(() => {
        const nextCol = colEl.nextElementSibling;
        nextCol?.querySelector('.mc-item')?.focus();
      }, 260);
    }
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    const prevCol = colEl.previousElementSibling;
    const target = prevCol?.querySelector('.mc-item.selected') || prevCol?.querySelector('.mc-item');
    target?.focus();
  }
});

/* ── GLOBAL CLICK — close menus ─────────────────────────────────────────────── */
document.addEventListener('click', e => {
  if (!e.target.closest('.tb-user-wrap'))  closeUserMenu();
  if (!e.target.closest('.finder-wrap'))   { finderDD.classList.remove('visible'); finderInput.setAttribute('aria-expanded','false'); }
  if (!e.target.closest('#state-nav'))     { statePanel.classList.remove('open'); stateToggle.setAttribute('aria-expanded','false'); }
});

/* ── DRAG AND DROP (native HTML5) ───────────────────────────────────────────── */
let liveDragItem = null;
let liveDragName = '';

document.addEventListener('dragstart', e => {
  const item = e.target.closest('.mc-item[draggable="true"]');
  if (!item) return;
  liveDragItem = item;
  liveDragName = item.querySelector('.mc-item-name')?.textContent || '';
  dragGhost.textContent = '🖼️  ' + liveDragName;
  dragGhost.style.display = 'block';
  dragGhost.style.left = (e.clientX + 18) + 'px';
  dragGhost.style.top  = (e.clientY - 10) + 'px';
  item.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setDragImage(new Image(), 0, 0); // Hide default ghost
}, true);

document.addEventListener('dragover', e => {
  e.preventDefault();
  dragGhost.style.left = (e.clientX + 18) + 'px';
  dragGhost.style.top  = (e.clientY - 10) + 'px';
  const over = e.target.closest('.mc-item');
  if (over && over !== liveDragItem) {
    document.querySelectorAll('.mc-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    over.classList.add('drag-over');
  }
}, true);

document.addEventListener('dragend', () => {
  if (liveDragItem) liveDragItem.classList.remove('dragging');
  dragGhost.style.display = 'none';
  document.querySelectorAll('.mc-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (liveDragName) toast('✅', `"${liveDragName}" movido`, true, () => toast('↩️', `"${liveDragName}" restaurado`));
  liveDragItem = null; liveDragName = '';
}, true);
