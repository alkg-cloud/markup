<!--
  FULL PROTOTYPE — Markup Design System
  Combines all design system components into a single navigable prototype.

  Typography:
  - Display: Manrope 700, tracking -0.02em
  - Body: Manrope 400/500/600, 13-14px
  - Mono: JetBrains Mono 400/500, 10-12px
  - Labels: Manrope 600, 10px, uppercase, tracking 0.12em

  Palette:
  - Dominant: oklch dark (7-15% lightness, hue 165)
  - Accent: oklch(74.4% 0.193 165) — vivid teal-green
  - Surfaces: layered elevation via bg/bg-elevated/bg-card
  - Borders: 3 tiers (subtle/default/strong)

  Motion:
  - ease-standard for layout shifts (sidebar, panels)
  - ease-spring for micro-interactions (dropdowns, tooltips)
  - ease-exit for dismissals
  - All gated by prefers-reduced-motion

  Atmospheric:
  - Sidebar: translucent rgba(14,12,16,0.8) + backdrop-filter blur(12px)
  - Command palette: glassmorphism dark, shadow-glow signature
  - Cards: subtle gradient overlay on thumbnails
  - Scrollbars: thin, themed to border tokens
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markup — Full Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────────────── */
    :root {
      --bg: oklch(11% 0.03 165);
      --bg-elevated: oklch(7% 0.02 165);
      --bg-card: oklch(12% 0.02 165);
      --bg-card-active: oklch(15% 0.025 165);
      --bg-tinted: oklch(9% 0.02 165);
      --btn-bg: rgb(39, 39, 39);
      --btn-bg-hover: rgb(48, 48, 48);
      --btn-bg-active: rgb(56, 56, 56);
      --surface-hover: rgba(255,255,255,0.04);
      --surface-active: rgba(255,255,255,0.07);
      --border-subtle: oklch(17% 0.02 165);
      --border: oklch(21% 0.025 165);
      --border-strong: oklch(28% 0.025 165);
      --text-bright: oklch(97% 0.01 165);
      --text: oklch(82% 0.04 165);
      --text-dim: oklch(60% 0.02 165);
      --text-muted: oklch(47% 0.02 165);
      --accent: oklch(74.4% 0.193 165);
      --accent-bright: oklch(82% 0.18 165);
      --accent-soft: oklch(28% 0.08 165);
      --accent-overlay-soft: oklch(74.4% 0.193 165 / 0.18);
      --accent-overlay-mid: oklch(74.4% 0.193 165 / 0.35);
      --success: oklch(76% 0.16 152);
      --warning: oklch(80% 0.15 80);
      --danger: oklch(70% 0.2 25);
      --danger-soft: oklch(28% 0.09 25);
      --danger-border: oklch(40% 0.1 25);
      --focus-ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
      --shadow-glow: 0 0 0 1px oklch(74.4% 0.193 165 / 0.4), 0 0 24px oklch(74.4% 0.193 165 / 0.18);
      --shadow-popover: 0 14px 32px oklch(0%,0,0/0.6), 0 6px 12px oklch(0%,0,0/0.45), inset 0 1px 0 oklch(100%,0,0/0.06);
      --scrim-strong: oklch(0% 0 0 / 0.65);
      --font-body: "Manrope", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      --ease-standard: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-spring: cubic-bezier(0.5, 1.4, 0.6, 1);
      --ease-exit: cubic-bezier(0.32, 0, 0.67, 0);
      --motion-fast: 160ms;
      --motion-base: 220ms;
      --topbar-height: 52px;
      --sidebar-width: 280px;
      --sidebar-collapsed-width: 52px;
      --pill-width: 84px;
      --pill-height: 40px;
      --pill-top: 5px;
      --pill-left: 5px;
      --morph-dur: 360ms;
      --morph-ease: cubic-bezier(0.4, 0.8, 0.2, 1);
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-card: 14px;
      --radius-pill: 9999px;
      --shadow-sm: 0 2px 6px oklch(0%,0,0/0.45);
      --shadow-md: 0 6px 16px oklch(0%,0,0/0.5);
    }
    @media (prefers-reduced-motion: reduce) {
      :root { --motion-fast: 0ms; --motion-base: 0ms; --morph-dur: 0ms; }
    }

    /* ─── RESET & BASE ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input { font-family: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--radius-xs); }
    mark { background: var(--accent-overlay-mid); color: var(--accent-bright); border-radius: 2px; padding: 0 1px; }

    /* ─── SCROLLBAR ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ─── LAYOUT SHELL ──────────────────────────────────────────── */
    #app { display: flex; height: 100vh; position: relative; }

    /* ─── SIDEBAR SPACER (maintains layout while sidebar is fixed) ── */
    #sidebar-spacer {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      flex-shrink: 0;
      transition: width var(--morph-dur) var(--morph-ease), min-width var(--morph-dur) var(--morph-ease);
    }
    #sidebar-spacer.collapsed { width: 0; min-width: 0; }

    /* ─── SIDEBAR (position: fixed, morphs into pill) ────────── */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      width: var(--sidebar-width);
      height: 100vh;
      background: rgba(14, 12, 16, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-subtle);
      border-top: none;
      border-left: none;
      border-bottom: none;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition:
        width var(--morph-dur) var(--morph-ease),
        height var(--morph-dur) var(--morph-ease),
        top var(--morph-dur) var(--morph-ease),
        left var(--morph-dur) var(--morph-ease),
        border-radius var(--morph-dur) var(--morph-ease),
        border-color var(--morph-dur) var(--morph-ease),
        box-shadow var(--morph-dur) var(--morph-ease);
    }
    #sidebar.collapsed {
      width: var(--pill-width);
      height: var(--pill-height);
      top: var(--pill-top);
      left: var(--pill-left);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm), 0 0 0 1px oklch(100% 0 0/0.04);
    }

    .sidebar-header {
      height: var(--topbar-height);
      min-height: var(--topbar-height);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      flex-shrink: 0;
      transition: height var(--morph-dur) var(--morph-ease), min-height var(--morph-dur) var(--morph-ease), padding var(--morph-dur) var(--morph-ease);
    }
    #sidebar.collapsed .sidebar-header {
      height: var(--pill-height);
      min-height: var(--pill-height);
      padding: 0 10px;
    }
    .sidebar-logo {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 16px;
      color: var(--text-bright);
      letter-spacing: -0.02em;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      display: flex;
      align-items: baseline;
    }
    .logo-full {
      display: inline-block;
      max-width: 100px;
      overflow: hidden;
      transition: max-width var(--morph-dur) var(--morph-ease), opacity calc(var(--morph-dur)*0.5) var(--ease-exit);
    }
    #sidebar.collapsed .logo-full { max-width: 0; opacity: 0; }
    #sidebar:not(.collapsed) .logo-full {
      transition: max-width var(--morph-dur) var(--morph-ease), opacity calc(var(--morph-dur)*0.5) var(--ease-standard) calc(var(--morph-dur)*0.4);
    }
    .logo-dot { color: var(--accent); font-size: 1.5em; line-height: 0; vertical-align: baseline; }
    .collapse-btn {
      width: 26px;
      height: 26px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: background var(--motion-fast), color var(--motion-fast), margin var(--morph-dur) var(--morph-ease);
      flex-shrink: 0;
      margin-left: auto;
    }
    .collapse-btn:hover { background: var(--surface-hover); color: var(--text); }
    .collapse-btn .icon-expand { display: none; height: 14px; }
    .collapse-btn .icon-collapse { display: block; height: 14px; }
    #sidebar.collapsed .collapse-btn .icon-expand { display: block; }
    #sidebar.collapsed .collapse-btn .icon-collapse { display: none; }

    /* Sidebar scroll + footer: phased fade for morph */
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 0;
      opacity: 1;
      transition: opacity calc(var(--morph-dur)*0.35) var(--ease-exit);
    }
    .sidebar-footer {
      padding: 8px 8px;
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
      opacity: 1;
      transition: opacity calc(var(--morph-dur)*0.35) var(--ease-exit);
    }
    #sidebar.collapsed .sidebar-scroll { opacity: 0; pointer-events: none; overflow: hidden; }
    #sidebar.collapsed .sidebar-footer { opacity: 0; pointer-events: none; }
    #sidebar:not(.collapsed) .sidebar-scroll {
      transition: opacity calc(var(--morph-dur)*0.4) var(--ease-standard) calc(var(--morph-dur)*0.55);
    }
    #sidebar:not(.collapsed) .sidebar-footer {
      transition: opacity calc(var(--morph-dur)*0.4) var(--ease-standard) calc(var(--morph-dur)*0.55);
    }

    /* Sidebar section labels */
    .sidebar-section-label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 16px 4px;
      white-space: nowrap;
      overflow: hidden;
    }

    /* Tree items */
    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px 0 0;
      height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
      transition: background var(--motion-fast), color var(--motion-fast);
      user-select: none;
      margin: 0 4px;
    }
    .tree-item:hover { background: var(--surface-hover); color: var(--text); }
    .tree-item.active {
      background: var(--accent-overlay-soft);
      color: var(--accent-bright);
    }
    .tree-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 4px; bottom: 4px;
      width: 2px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }
    .tree-indent-1 { padding-left: 12px; }
    .tree-indent-2 { padding-left: 28px; }
    .tree-indent-3 { padding-left: 44px; }
    .tree-indent-4 { padding-left: 60px; }

    .tree-chevron {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: transform var(--motion-fast) var(--ease-standard);
    }
    .tree-chevron.open { transform: rotate(90deg); color: var(--accent); }
    .tree-icon { font-size: 13px; flex-shrink: 0; line-height: 1; }
    .tree-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; padding-right: 28px; }
    .tree-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-pill);
      padding: 1px 5px;
      flex-shrink: 0;
      transition: opacity var(--motion-fast), transform var(--motion-fast);
    }
    .tree-kebab {
      width: 20px;
      height: 20px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      flex-shrink: 0;
      opacity: 0;
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      transition: opacity var(--motion-fast), background var(--motion-fast);
    }
    .tree-item:hover .tree-count { opacity: 0; transform: scale(0.8); }
    .tree-item:hover .tree-kebab { opacity: 1; }
    .tree-kebab:hover { background: var(--surface-active); color: var(--text); }

    /* Tree children collapse */
    .tree-children {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows var(--motion-base) var(--ease-standard);
    }
    .tree-children-inner { overflow: hidden; }
    .tree-children.open { grid-template-rows: 1fr; }

    /* Sidebar footer (styles merged into phased-fade block above) */
    .btn-new-project {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      height: 34px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      background: var(--accent-soft);
      border: 1px solid var(--accent-overlay-mid);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--motion-fast), color var(--motion-fast), border-color var(--motion-fast);
    }
    .btn-new-project:hover {
      background: var(--accent-overlay-mid);
      border-color: var(--accent);
      color: var(--accent-bright);
    }

    /* ─── RIGHT PANEL (topbar + main) ───────────────────────────── */
    #right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ─── TOPBAR ────────────────────────────────────────────────── */
    #topbar {
      height: var(--topbar-height);
      min-height: var(--topbar-height);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      position: relative;
      z-index: 90;
      flex-shrink: 0;
      transition: margin-left var(--morph-dur) var(--morph-ease);
    }
    #sidebar-spacer.collapsed ~ #right-panel #topbar { margin-left: 80px; }

    /* Breadcrumb in topbar */
    .topbar-breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      min-width: 0;
      flex-shrink: 1;
    }
    .topbar-breadcrumb a {
      color: var(--text-dim);
      transition: color var(--motion-fast);
      white-space: nowrap;
    }
    .topbar-breadcrumb a:hover { color: var(--text); }
    .topbar-breadcrumb .bc-current {
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-breadcrumb .bc-sep { color: var(--text-muted); font-size: 11px; flex-shrink: 0; }

    .topbar-spacer { flex: 1; }

    /* Search pill — centered in topbar (exact style of variante-e topbar-search-pill) */
    #search-pill {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      height: 36px;
      padding: 0 14px 0 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-dim);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: background var(--motion-fast), border-color var(--motion-fast), box-shadow var(--motion-fast), color var(--motion-fast);
      white-space: nowrap;
      min-width: 240px;
      max-width: 340px;
    }
    #search-pill:hover {
      background: var(--bg-card-active);
      border-color: var(--border-strong);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    #search-pill svg { flex-shrink: 0; color: var(--text-muted); }
    .pill-text { flex: 1; }
    .pill-kbd {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 2px 6px;
      flex-shrink: 0;
    }

    /* Topbar right */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-left: auto;
    }
    .btn-new-mockup {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      background: var(--accent);
      color: var(--bg);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: -0.01em;
      transition: background var(--motion-fast), transform var(--motion-fast);
    }
    .btn-new-mockup:hover { background: var(--accent-bright); }
    .btn-new-mockup:active { transform: scale(0.98); }

    /* Avatar */
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-pill);
      background: var(--accent-soft);
      border: 1.5px solid var(--accent-overlay-mid);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: border-color var(--motion-fast);
    }
    .avatar-btn:hover { border-color: var(--accent); }

    /* Dropdown menu (shared) */
    .dropdown-menu {
      position: absolute;
      background: var(--bg-elevated);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-glow), var(--shadow-popover);
      min-width: 180px;
      z-index: 500;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.95) translateY(-4px);
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-exit), transform var(--motion-fast) var(--ease-exit);
    }
    .dropdown-menu.open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      transition: opacity var(--motion-fast) var(--ease-spring), transform var(--motion-fast) var(--ease-spring);
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--motion-fast);
      width: 100%;
      text-align: left;
      animation: dropdown-item-in 200ms var(--ease-spring) backwards;
    }
    @keyframes dropdown-item-in {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .dropdown-item:hover { background: var(--surface-hover); }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item.danger:hover { background: var(--danger-soft); }
    .dropdown-divider { height: 1px; background: var(--border-subtle); margin: 4px 0; }
    /* Avatar menu header */
    .menu-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
    }
    .menu-header-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-pill);
      background: var(--accent-soft);
      border: 1.5px solid var(--accent-overlay-mid);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
    }
    .menu-header-info { display: flex; flex-direction: column; min-width: 0; }
    .menu-header-name { font-size: 13px; font-weight: 600; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .menu-header-email { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── MAIN CONTENT ──────────────────────────────────────────── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 40px;
    }

    /* Page header */
    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    /* Section */
    .section { margin-bottom: 32px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-card);
      overflow: hidden;
      cursor: pointer;
      transition: background var(--motion-fast), border-color var(--motion-fast), transform var(--motion-fast), box-shadow var(--motion-fast);
      position: relative;
    }
    .card:hover {
      background: var(--bg-card-active);
      border-color: var(--border);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .card:active { transform: translateY(0); }
    .card-thumb {
      height: 100px;
      background: var(--bg-card-active);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 32px;
      position: relative;
      overflow: hidden;
    }
    .card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, oklch(74.4% 0.193 165/0.06));
      pointer-events: none;
    }
    .card-thumb-code {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      padding: 10px;
      line-height: 1.6;
      text-align: left;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .card-thumb-code .mono-accent { color: var(--accent); }
    .card-body { padding: 10px 14px 12px; }
    .card-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-bright);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      margin-top: 6px;
    }
    .badge-warning {
      background: oklch(80% 0.15 80 / 0.15);
      color: var(--warning);
      border: 1px solid oklch(80% 0.15 80 / 0.3);
    }
    .badge-success {
      background: oklch(76% 0.16 152 / 0.12);
      color: var(--success);
      border: 1px solid oklch(76% 0.16 152 / 0.25);
    }

    /* Folder card */
    .folder-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color var(--motion-fast), background var(--motion-fast);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .folder-card:hover { border-color: var(--border-strong); background: var(--bg-card-active); }
    .folder-card-icon { font-size: 20px; }
    .folder-card-info { flex: 1; min-width: 0; }
    .folder-card-name { font-weight: 600; font-size: 14px; color: var(--text-bright); }
    .folder-card-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }

    /* Recent list */
    .recent-list { display: flex; flex-direction: column; gap: 2px; }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--motion-fast);
    }
    .recent-item:hover { background: var(--surface-hover); }
    .recent-item-icon { font-size: 15px; flex-shrink: 0; }
    .recent-item-info { flex: 1; min-width: 0; }
    .recent-item-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-item-path { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-item-time { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); flex-shrink: 0; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 32px;
      text-align: center;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.5; }
    .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text-bright); letter-spacing: -0.02em; margin-bottom: 8px; }
    .empty-state-desc { font-size: 13px; color: var(--text-dim); max-width: 320px; line-height: 1.6; margin-bottom: 24px; }
    .empty-state-actions { display: flex; gap: 8px; }
    .btn-secondary {
      height: 36px;
      padding: 0 16px;
      border-radius: var(--radius-sm);
      background: var(--btn-bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background var(--motion-fast), border-color var(--motion-fast);
    }
    .btn-secondary:hover { background: var(--btn-bg-hover); border-color: var(--border-strong); }
    .btn-accent {
      height: 36px;
      padding: 0 16px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      border: none;
      color: var(--bg);
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background var(--motion-fast);
    }
    .btn-accent:hover { background: var(--accent-bright); }

    /* ─── COMMAND PALETTE (finder overlay) — exact style of palette-container from variante-e ── */
    #palette-scrim {
      position: fixed;
      inset: 0;
      background: var(--scrim-strong);
      z-index: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-exit);
    }
    #palette-scrim.open {
      opacity: 1;
      pointer-events: auto;
      transition: opacity var(--motion-fast) var(--ease-spring);
    }
    #palette-container {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) scale(0.97);
      width: min(640px, 92vw);
      background: var(--bg-elevated);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-glow), var(--shadow-popover);
      z-index: 1000;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms var(--ease-exit), transform 120ms var(--ease-exit);
    }
    #palette-container.open {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: auto;
      transition: opacity 180ms var(--ease-spring), transform 180ms var(--ease-spring);
    }
    .palette-input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 56px;
      flex-shrink: 0;
    }
    .palette-search-icon { color: var(--text-muted); flex-shrink: 0; }
    #palette-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 18px;
      color: var(--text-bright);
      letter-spacing: -0.015em;
      caret-color: var(--accent);
    }
    #palette-input::placeholder { color: var(--text-muted); font-weight: 500; }
    .palette-esc-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 3px 7px;
      flex-shrink: 0;
      cursor: pointer;
      transition: color var(--motion-fast), border-color var(--motion-fast);
    }
    .palette-esc-badge:hover { color: var(--text); border-color: var(--border-strong); }
    .palette-divider { height: 1px; background: var(--border-subtle); }
    #palette-results { max-height: 360px; overflow-y: auto; padding: 6px 0; }
    .palette-section-label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 16px 4px;
    }
    .palette-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 44px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background var(--motion-fast), border-color var(--motion-fast);
      animation: palette-item-in 200ms var(--ease-spring) backwards;
    }
    @keyframes palette-item-in {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .palette-item:hover { background: var(--surface-hover); }
    .palette-item.selected { background: var(--accent-overlay-soft); border-left-color: var(--accent); }
    .palette-item-icon {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .palette-item-info { flex: 1; min-width: 0; }
    .palette-item-name { font-size: 14px; font-weight: 500; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .palette-item-path { font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .palette-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .palette-footer-hint {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }
    .palette-footer-hint kbd {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }

    /* ─── PROJECT KEBAB POPOVER ─────────────────────────────────── */
    .kebab-popover {
      position: fixed;
      background: var(--bg-elevated);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-glow), var(--shadow-popover);
      min-width: 180px;
      z-index: 600;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.95) translateY(-4px);
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-exit), transform var(--motion-fast) var(--ease-exit);
    }
    .kebab-popover.open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      transition: opacity var(--motion-fast) var(--ease-spring), transform var(--motion-fast) var(--ease-spring);
    }

    /* ─── DIALOG (shared) ───────────────────────────────────────── */
    .dialog-scrim {
      position: fixed;
      inset: 0;
      background: var(--scrim-strong);
      z-index: 800;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .dialog-scrim.open { display: flex; }
    .dialog {
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-popover);
      width: min(440px, 92vw);
      padding: 24px;
      animation: dialog-in 180ms var(--ease-spring) both;
    }
    @keyframes dialog-in {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .dialog-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 16px;
    }
    .dialog-field { margin-bottom: 16px; }
    .dialog-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      display: block;
    }
    .dialog-input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text-bright);
      outline: none;
      transition: border-color var(--motion-fast);
    }
    .dialog-input:focus { border-color: var(--accent); }
    .dialog-input::placeholder { color: var(--text-muted); }
    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* ─── ICON PICKER (DS 06) ──────────────────────────────────── */
    .picker-popover {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-popover);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 380px;
      margin-top: 8px;
    }
    .picker-search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .picker-search-icon { color: var(--text-muted); display: flex; flex-shrink: 0; }
    .picker-search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--text-bright);
    }
    .picker-search-input::placeholder { color: var(--text-muted); }
    .picker-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 8px;
    }
    .picker-tab {
      flex: 1;
      padding: 8px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: color var(--motion-fast), border-color var(--motion-fast);
    }
    .picker-tab:hover { color: var(--text); }
    .picker-tab.active { color: var(--accent-bright); border-bottom-color: var(--accent); }
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
      padding: 8px;
      overflow-y: auto;
      flex: 1;
    }
    .picker-cell {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xs);
      border: 1.5px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: background var(--motion-fast), border-color var(--motion-fast), color var(--motion-fast);
    }
    .picker-cell:hover { background: var(--surface-hover); color: var(--text); }
    .picker-cell.selected { border-color: var(--accent); background: var(--accent-overlay-soft); color: var(--accent-bright); }
    .picker-footer {
      padding: 8px 12px;
      border-top: 1px solid var(--border-subtle);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }
    .picker-token { color: var(--accent); }

    /* ─── MOCKUP VIEW ───────────────────────────────────────────── */
    .mockup-view {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .mockup-view-toolbar {
      height: 44px;
      min-height: 44px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }
    .mockup-view-toolbar .toolbar-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .toolbar-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      transition: background var(--motion-fast), color var(--motion-fast);
    }
    .toolbar-btn:hover { background: var(--surface-hover); color: var(--text); }
    .toolbar-btn.active { background: var(--accent-overlay-soft); color: var(--accent); }
    .toolbar-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .toolbar-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      padding: 0 4px;
    }
    .mockup-view-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .mockup-canvas-area {
      flex: 1;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mockup-canvas-placeholder {
      width: 80%;
      max-width: 900px;
      aspect-ratio: 16/10;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .canvas-placeholder-bar {
      height: 28px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 6px;
    }
    .canvas-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
    }
    .canvas-placeholder-body {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .canvas-skel { border-radius: var(--radius-xs); background: var(--bg-card-active); }
    .canvas-skel-title { width: 40%; height: 18px; }
    .canvas-skel-text { width: 70%; height: 10px; }
    .canvas-skel-text-short { width: 50%; height: 10px; }
    .canvas-skel-block { width: 100%; height: 60px; border-radius: var(--radius-sm); }

    /* Annotation markers */
    .annotation-marker {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 0 3px oklch(74.4% 0.193 165 / 0.3);
      transition: transform var(--motion-fast);
    }
    .annotation-marker:hover { transform: scale(1.15); }

    /* Annotations panel */
    .annotations-panel {
      width: 320px;
      min-width: 320px;
      background: var(--bg-elevated);
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .annotations-panel-header {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .annotations-panel-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .annotation-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-pill);
      padding: 1px 6px;
    }
    .annotations-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .annotation-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color var(--motion-fast);
    }
    .annotation-card:hover { border-color: var(--border); }
    .annotation-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .annotation-number {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .annotation-author {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
    .annotation-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .annotation-text {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .annotation-text .intent-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: var(--radius-xs);
      padding: 1px 5px;
      margin-right: 4px;
    }
    .annotation-input-area {
      padding: 8px;
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .annotation-input {
      width: 100%;
      min-height: 56px;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font-body);
      color: var(--text-bright);
      resize: vertical;
      outline: none;
      transition: border-color var(--motion-fast);
    }
    .annotation-input:focus { border-color: var(--accent); }
    .annotation-input::placeholder { color: var(--text-muted); }

    /* ─── TOAST ─────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-elevated);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-pill);
      padding: 10px 16px;
      box-shadow: var(--shadow-glow), var(--shadow-popover);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      pointer-events: auto;
      white-space: nowrap;
      animation: toast-in 150ms var(--ease-spring) forwards;
      position: relative;
    }
    .toast.out { animation: toast-out 250ms var(--ease-exit) forwards; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toast-out {
      from { opacity: 1; }
      to { opacity: 0; transform: translateY(8px) scale(0.95); }
    }

    /* ─── STATE SWITCHER ────────────────────────────────────────── */
    #states-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 3000;
    }
    #states-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-md);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: background var(--motion-fast), color var(--motion-fast), border-color var(--motion-fast);
    }
    #states-toggle:hover { background: var(--bg-card); color: var(--text); border-color: var(--accent); }
    #states-menu {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-popover);
      min-width: 260px;
      max-height: 480px;
      overflow-y: auto;
      opacity: 0;
      transform: scale(0.95) translateY(6px);
      transform-origin: bottom right;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-exit), transform var(--motion-fast) var(--ease-exit);
    }
    #states-menu.open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      transition: opacity var(--motion-fast) var(--ease-spring), transform var(--motion-fast) var(--ease-spring);
    }
    .states-menu-header {
      padding: 10px 14px 6px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-subtle);
    }
    .state-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background var(--motion-fast);
      width: 100%;
      text-align: left;
    }
    .state-item:hover { background: var(--surface-hover); }
    .state-item.active { background: var(--accent-overlay-soft); }
    .state-num { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); min-width: 18px; }
    .state-item.active .state-num { color: var(--accent); }
    .state-label { font-size: 12px; font-weight: 500; color: var(--text-dim); }
    .state-item.active .state-label { color: var(--accent-bright); }

    /* ─── SR-ONLY ───────────────────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ─── VIEW TRANSITIONS ──────────────────────────────────────── */
    .view-hidden { display: none !important; }
  </style>
</head>

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

function chevronSvg() {
  return '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.072 8.024L5.715 3.667l.618-.62L11 7.716v.618L6.333 13l-.618-.619 4.357-4.357z"/></svg>';
}

function countMockups(node) {
  let c = (node.mockups || []).length;
  (node.folders || []).forEach(f => c += countMockups(f));
  return c;
}

function renderSidebarTree() {
  const tree = $('#sidebarTree');
  let html = '';

  DATA.projects.forEach(proj => {
    const isExp = state.expanded[proj.id];
    const count = countMockups(proj);
    html += `<div class="tree-item tree-indent-1" data-id="${proj.id}" data-type="project" onclick="toggleExpand('${proj.id}')">
      <span class="tree-chevron ${isExp ? 'open' : ''}">${chevronSvg()}</span>
      <span class="tree-icon">${proj.icon}</span>
      <span class="tree-label">${proj.name}</span>
      <span class="tree-count">${count}</span>
      <button class="tree-kebab" onclick="event.stopPropagation();openKebab(event,'${proj.id}')" aria-label="Project menu">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg>
      </button>
    </div>`;
    html += `<div class="tree-children ${isExp ? 'open' : ''}" id="children-${proj.id}"><div class="tree-children-inner">`;
    html += renderFolders(proj.folders, 2, proj.slug);
    (proj.mockups || []).forEach(m => {
      html += `<div class="tree-item tree-indent-2" data-id="${m.id}" data-type="mockup" onclick="navigateTo('mockup','${m.id}','${proj.name}','${m.name}')">
        <span class="tree-icon">🖼</span>
        <span class="tree-label">${m.name}</span>
      </div>`;
    });
    html += '</div></div>';
  });

  tree.innerHTML = html;

  // No-project items
  const npHtml = DATA.noProject.map(m =>
    `<div class="tree-item tree-indent-1" data-id="${m.id}" data-type="mockup" onclick="navigateTo('mockup','${m.id}','No Project','${m.name}')">
      <span class="tree-icon">🖼</span>
      <span class="tree-label">${m.name}</span>
    </div>`
  ).join('');
  $('#noProjectItems').innerHTML = npHtml;
}

function renderFolders(folders, level, projectSlug) {
  let html = '';
  (folders || []).forEach(f => {
    const isExp = state.expanded[f.id];
    html += `<div class="tree-item tree-indent-${level}" data-id="${f.id}" data-type="folder" onclick="toggleExpand('${f.id}')">
      <span class="tree-chevron ${isExp ? 'open' : ''}">${chevronSvg()}</span>
      <span class="tree-icon">${f.icon}</span>
      <span class="tree-label">${f.name}</span>
    </div>`;
    html += `<div class="tree-children ${isExp ? 'open' : ''}" id="children-${f.id}"><div class="tree-children-inner">`;
    if (f.folders && f.folders.length) {
      html += renderFolders(f.folders, Math.min(level + 1, 4), projectSlug);
    }
    (f.mockups || []).forEach(m => {
      html += `<div class="tree-item tree-indent-${Math.min(level + 1, 4)}" data-id="${m.id}" data-type="mockup" onclick="navigateTo('mockup','${m.id}','${projectSlug}','${m.name}')">
        <span class="tree-icon">🖼</span>
        <span class="tree-label">${m.name}</span>
      </div>`;
    });
    html += '</div></div>';
  });
  return html;
}

function toggleExpand(id) {
  state.expanded[id] = !state.expanded[id];
  const isOpen = state.expanded[id];
  const children = document.getElementById('children-' + id);
  const row = document.querySelector(`[data-id="${id}"] .tree-chevron`);
  if (children) children.classList.toggle('open', isOpen);
  if (row) row.classList.toggle('open', isOpen);
}

  { id: 'agent-tokens', label: 'Agent tokens' }
];

function navigateTo(view, id, projectName, mockupName) {
  state.currentView = view;
  const main = $('#main');

  // Update breadcrumb
  updateBreadcrumb(view, projectName, mockupName);

  switch (view) {
    case 'home': renderHomeView(main); break;
    case 'project': renderProjectView(main, id || 'alpha'); break;
    case 'folder': renderFolderView(main, id || 'landing'); break;
    case 'mockup': renderMockupView(main, id || 'hero-v3', projectName, mockupName); break;
    case 'empty-project': renderEmptyProject(main); break;
    case 'empty-folder': renderEmptyFolder(main); break;
    case 'agent-tokens': renderAgentTokens(main); break;
    default: renderHomeView(main);
  }

  // Highlight active state in switcher
  updateStateSwitcher();
}

function updateBreadcrumb(view, projectName, mockupName) {
  const bc = $('#breadcrumb');
  const truncName = (name, max) => name && name.length > max ? name.slice(0, max) + '…' : name;
  if (view === 'home') {
    bc.innerHTML = '';
  } else if (view === 'project') {
    bc.innerHTML = `<span class="bc-current">${projectName || 'Project Alpha'}</span>`;
  } else if (view === 'folder') {
    bc.innerHTML = `<a href="#" onclick="navigateTo('project','alpha','Project Alpha');return false">Project Alpha</a>
      <span class="bc-sep"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.072 8.024L5.715 3.667l.618-.62L11 7.716v.618L6.333 13l-.618-.619 4.357-4.357z"/></svg></span>
      <span class="bc-current">Landing</span>`;
  } else if (view === 'mockup') {
    bc.innerHTML = `<a href="#" onclick="navigateTo('project','alpha','${projectName || 'Project Alpha'}');return false">${projectName || 'Project Alpha'}</a>
      <span class="bc-sep"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.072 8.024L5.715 3.667l.618-.62L11 7.716v.618L6.333 13l-.618-.619 4.357-4.357z"/></svg></span>
      <span class="bc-current">${truncName(mockupName || 'Hero v3', 28)}</span>`;
  } else if (view === 'agent-tokens') {
    bc.innerHTML = '';
  } else {
    bc.innerHTML = '';
  }
}

              </div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

function findFolder(folders, id) {
  for (const f of folders) {
    if (f.id === id) return f;
    if (f.folders) {
      const found = findFolder(f.folders, id);
      if (found) return found;
    }
  }
  return null;
}

// ══════════════════════════════════════
// COMMAND PALETTE
// ══════════════════════════════════════
function openPalette() {
  state.paletteOpen = true;
  $('#palette-scrim').classList.add('open');
  $('#palette-container').classList.add('open');
  $('#palette-input').value = '';
  $('#palette-input').focus();
  renderPaletteResults('');
}

function closePalette() {
  state.paletteOpen = false;
  $('#palette-scrim').classList.remove('open');
  $('#palette-container').classList.remove('open');
}

function renderPaletteResults(query) {
  const res = $('#palette-results');
  const allItems = [];

  DATA.projects.forEach(p => {
    allItems.push({ name: p.name, icon: p.icon, path: '', type: 'project', id: p.id });
    function walk(folders, path) {
      folders.forEach(f => {
        allItems.push({ name: f.name, icon: f.icon, path: path, type: 'folder', id: f.id });
        (f.mockups || []).forEach(m => {
          allItems.push({ name: m.name, icon: '🖼', path: path + ' / ' + f.name, type: 'mockup', id: m.id, projectName: p.name });
        });
        if (f.folders) walk(f.folders, path + ' / ' + f.name);
      });
    }
    walk(p.folders, p.name);
    (p.mockups || []).forEach(m => {
      allItems.push({ name: m.name, icon: '🖼', path: p.name, type: 'mockup', id: m.id, projectName: p.name });
    });
  });

  DATA.noProject.forEach(m => {
    allItems.push({ name: m.name, icon: '🖼', path: 'No Project', type: 'mockup', id: m.id, projectName: 'No Project' });
  });

  const q = query.toLowerCase();
  const filtered = q.length < 1 ? allItems : allItems.filter(i => i.name.toLowerCase().includes(q) || i.path.toLowerCase().includes(q));

  const groups = { project: [], folder: [], mockup: [] };
  filtered.forEach(i => groups[i.type].push(i));

  let html = '';
  if (groups.project.length) {
    html += '<div class="palette-section-label">PROJECTS</div>';
    groups.project.forEach((item, i) => {
      html += `<div class="palette-item ${i === 0 && !q ? 'selected' : ''}" style="animation-delay:${i * 20}ms" onclick="closePalette();navigateTo('project','${item.id}','${item.name}')">
        <div class="palette-item-icon">${item.icon}</div>
        <div class="palette-item-info">
          <div class="palette-item-name">${highlight(item.name, q)}</div>
        </div>
      </div>`;
    });
  }
  if (groups.folder.length) {
    html += '<div class="palette-section-label">FOLDERS</div>';
    groups.folder.forEach((item, i) => {
      html += `<div class="palette-item" style="animation-delay:${(i + groups.project.length) * 20}ms" onclick="closePalette();navigateTo('folder','${item.id}')">
        <div class="palette-item-icon">${item.icon}</div>
        <div class="palette-item-info">
          <div class="palette-item-name">${highlight(item.name, q)}</div>
          <div class="palette-item-path">${item.path}</div>
        </div>
      </div>`;
    });
  }
  if (groups.mockup.length) {
    html += '<div class="palette-section-label">MOCKUPS</div>';
    groups.mockup.forEach((item, i) => {
      html += `<div class="palette-item" style="animation-delay:${(i + groups.project.length + groups.folder.length) * 20}ms" onclick="closePalette();navigateTo('mockup','${item.id}','${item.projectName}','${item.name}')">
        <div class="palette-item-icon">${item.icon}</div>
        <div class="palette-item-info">
          <div class="palette-item-name">${highlight(item.name, q)}</div>
          <div class="palette-item-path">${item.path}</div>
        </div>
      </div>`;
    });
  }
  if (!html) {
    html = '<div style="padding:40px 20px;text-align:center"><div style="font-size:32px;margin-bottom:12px;opacity:0.4">🔍</div><div style="font-size:14px;font-weight:500;color:var(--text-dim)">No results found</div></div>';
  }
  res.innerHTML = html;
}

function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if (idx >= 0) return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
  return text;
}

$('#search-pill').addEventListener('click', openPalette);
$('#palette-scrim').addEventListener('click', closePalette);
$('#paletteEsc').addEventListener('click', closePalette);
$('#palette-input').addEventListener('input', e => renderPaletteResults(e.target.value));

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    state.paletteOpen ? closePalette() : openPalette();
  }
  if (e.key === 'Escape' && state.paletteOpen) closePalette();
});

// ══════════════════════════════════════
// KEBAB POPOVER
// ══════════════════════════════════════
function openKebab(e, projectId) {
  const popover = $('#kebabPopover');
  const rect = e.target.getBoundingClientRect();
  popover.style.top = rect.bottom + 4 + 'px';
  popover.style.left = rect.left + 'px';
  popover.classList.add('open');
  state.kebabTarget = projectId;

  const closeKebab = (ev) => {
    if (!popover.contains(ev.target)) {
      popover.classList.remove('open');
      document.removeEventListener('click', closeKebab);
    }
  };
  setTimeout(() => document.addEventListener('click', closeKebab), 10);
}

$$('#kebabPopover .dropdown-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;
    $('#kebabPopover').classList.remove('open');
    if (action === 'change-icon') {
      $('#newProjectScrim').classList.add('open');
      renderIconPicker();
      const nameInput = $('#newProjectName');
      const proj = DATA.projects.find(p => p.id === state.kebabTarget);
      if (proj) nameInput.value = proj.name;
    }
    if (action === 'change-name') showToast('Rename mode for ' + state.kebabTarget);
    if (action === 'archived') showToast('Showing archived mockups');
    if (action === 'delete') showToast('Delete project ' + state.kebabTarget);
  });
});

$('#avatarBtn').addEventListener('click', () => {

$('#btnNewProject').addEventListener('click', () => {

  $('#newProjectName').value = '';
  renderIconPicker();
  setTimeout(() => $('#newProjectName').focus(), 100);
});

  $('#newProjectScrim').classList.remove('open');
});

$('#newProjectScrim').addEventListener('click', (e) => {
  if (e.target === $('#newProjectScrim')) $('#newProjectScrim').classList.remove('open');
});

  const name = $('#newProjectName').value.trim();
  if (!name) return;
  $('#newProjectScrim').classList.remove('open');
  showToast(`Project "${name}" created with ${state.selectedIcon}`);
});

let pickerActiveTab = 'code';

function renderIconPicker() {
  const grid = $('#iconPickerGrid');
  const q = ($('#iconPickerSearch').value || '').toLowerCase().trim();
  const icons = PICKER_ICONS[pickerActiveTab] || [];
  let html = '';

  icons.forEach(ic => {
    if (q && !ic.token.toLowerCase().includes(q)) return;
    const sel = ic.token === state.selectedIcon ? ' selected' : '';
    if (ic.label) {
      html += `<div class="picker-cell${sel}" data-token="${ic.token}"><span style="font-size:16px">${ic.label}</span></div>`;
    } else {
      html += `<div class="picker-cell${sel}" data-token="${ic.token}">${ic.svg}</div>`;
    }
  });

  grid.innerHTML = html;

  grid.querySelectorAll('.picker-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      state.selectedIcon = cell.dataset.token;
      $('#pickerToken').textContent = cell.dataset.token;
      renderIconPicker();
    });
  });
}

$('#iconPickerSearch').addEventListener('input', renderIconPicker);

$('#iconPickerTabs').querySelectorAll('.picker-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    pickerActiveTab = tab.dataset.tab;
    $('#iconPickerTabs').querySelectorAll('.picker-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === pickerActiveTab));
    renderIconPicker();
  });
});

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function showToast(msg) {
  const container = $('#toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('out');
    setTimeout(() => toast.remove(), 260);
  }, 3000);
}

// STATE SWITCHER
// ══════════════════════════════════════
function renderStateSwitcher() {
  const menu = $('#states-menu');
  menu.innerHTML = '<div class="states-menu-header">Prototype views</div>' +
    VIEWS.map((v, i) => `
      <button class="state-item ${state.currentView === v.id ? 'active' : ''}" onclick="navigateTo('${v.id}');$('#states-menu').classList.remove('open')">
        <span class="state-num">${i + 1}</span>
        <span class="state-label">${v.label}</span>
      </button>
    `).join('');
}

function updateStateSwitcher() {
  const items = $$('#states-menu .state-item');
  items.forEach((item, i) => {
    item.classList.toggle('active', VIEWS[i].id === state.currentView);
  });
}

$('#states-toggle').addEventListener('click', () => {
  const menu = $('#states-menu');
  menu.classList.toggle('open');

  if (menu.classList.contains('open')) {
    const close = (e) => {
      if (!menu.contains(e.target) && e.target !== $('#states-toggle')) {
        menu.classList.remove('open');
        document.removeEventListener('click', close);
      }
    };
    setTimeout(() => document.addEventListener('click', close), 10);
  }
});
