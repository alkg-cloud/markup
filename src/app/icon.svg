<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Markup.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1d1c"/>
      <stop offset="1" stop-color="#0d0f0e"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!--
    "M." mirrors `sidebar-logo` (`src/components/Sidebar/Sidebar.module.css`):
      • Manrope-700-style M with chunky verticals + V centre
      • Period scaled like the sidebar's 1.5em accent dot, sitting on
        the M's baseline (right of the M's right leg)
    Glyphs are paths so the favicon ships without a bundled font face.
  -->
  <g transform="translate(40 50)">
    <!-- M  (cap-height 140, width 152, baseline at y=140) -->
    <path
      d="M0 140V0h32l44 92 44-92h32v140h-34V64l-30 66H64L34 64v76z"
      fill="#f5f5f5"
    />
    <!-- "." — accent-green round dot, ~0.36 of cap-height, baseline-aligned -->
    <circle cx="178" cy="118" r="22" fill="#34d399"/>
  </g>
</svg>
