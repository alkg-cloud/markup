name: CLA Assistant

# DISABLED — the contributor-assistant action requires a Personal Access Token
# with Contents:RW + Pull Requests:RW on this repo, stored as the `CLA_PAT`
# repository secret. Until that secret exists, this workflow would fail on
# every external PR.
#
# How to enable:
#   1. GitHub → Settings → Developer settings → Personal access tokens →
#      Fine-grained tokens → "Generate new token"
#      - Resource owner: your account
#      - Repository access: Only `markup`
#      - Permissions: Contents (RW) + Pull requests (RW)
#   2. Repo Settings → Secrets and variables → Actions → New repository secret
#      - Name:  CLA_PAT
#      - Value: <the token from step 1>
#   3. In this file, uncomment the `pull_request_target` and `issue_comment`
#      triggers below (and delete the `workflow_dispatch:` line if you don't
#      want the manual trigger anymore).

on:
  workflow_dispatch:
  # issue_comment:
  #   types: [created]
  # pull_request_target:
  #   types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/alkg-cloud/markup/blob/main/CLA.md'
          branch: 'main'
          allowlist: AlexandreCamillo,dependabot[bot]
